# ============================================================================
# AI AGENT IMPLEMENTATION GUIDE
# ============================================================================
# Purpose: Provide complete, unambiguous instructions for an AI agent to
#          implement the Student Research Assistant application with high
#          confidence and minimal ambiguity.
#
# Design Principle: Every decision is pre-made. Every file has exact content.
#                   No interpretation required. Copy-paste ready.
# ============================================================================
#
# ✅ UPDATED TO CANONICAL STRUCTURE (December 2024)
# ============================================================================
# This document has been updated to use the canonical module structure:
#   - core/           (schemas, exceptions)
#   - services/       (embeddings, vector_store, document_service, llm_service)
#   - tools/search.py (not search_tools.py)
#
# See docs/CANONICAL-STRUCTURE.yaml for the authoritative reference.
# ============================================================================

metadata:
  document_type: "AI Agent Implementation Guide"
  version: "1.0.0"
  target_audience: "AI Coding Assistants (Claude, GPT-4, Copilot)"
  confidence_target: "95%+ successful implementation"
  last_updated: "2024"

# ============================================================================
# SECTION 1: IMPLEMENTATION PRINCIPLES
# ============================================================================
implementation_principles:

  core_rules:
    - rule: "NO AMBIGUITY"
      description: "Every code snippet is complete and copy-paste ready"

    - rule: "NO DECISIONS REQUIRED"
      description: "All architectural decisions are pre-made"

    - rule: "EXPLICIT OVER IMPLICIT"
      description: "Every import, every type hint, every default value is specified"

    - rule: "WORKING INCREMENTS"
      description: "Each phase produces a working application"

    - rule: "TEST AS YOU GO"
      description: "Each component has verification steps"

  file_creation_order:
    description: "Create files in this EXACT order to avoid import errors"
    order:
      - "src/research_assistant/__init__.py"
      - "src/research_assistant/config/settings.py"
      - "src/research_assistant/config/prompts.py"
      - "src/research_assistant/core/exceptions.py"
      - "src/research_assistant/core/schemas.py"
      - "src/research_assistant/services/embeddings.py"
      - "src/research_assistant/services/vector_store.py"
      - "src/research_assistant/services/document_service.py"
      - "src/research_assistant/services/llm_service.py"
      - "src/research_assistant/tools/search.py"
      - "src/research_assistant/agents/base.py"
      - "src/research_assistant/agents/researcher.py"
      - "src/research_assistant/agents/writer.py"
      - "src/research_assistant/agents/critic.py"
      - "src/research_assistant/agents/supervisor.py"
      - "src/research_assistant/graph/state.py"
      - "src/research_assistant/graph/nodes.py"
      - "src/research_assistant/graph/workflow.py"
      - "src/research_assistant/ui/app.py"
      - "src/research_assistant/cli.py"

# ============================================================================
# SECTION 2: DIRECTORY STRUCTURE (CREATE FIRST)
# ============================================================================
