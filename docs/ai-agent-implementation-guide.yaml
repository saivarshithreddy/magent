  # FILE 10: Search Tools
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/tools/search.py"
    description: "Search tools for agents"
    content: |
      """Search tools for agents to use."""

      import logging
      from typing import Optional

      from research_assistant.services.vector_store import get_vector_store
      from research_assistant.core.schemas import RetrievedDocument
      from research_assistant.config.settings import settings

      logger = logging.getLogger(__name__)


      def search_documents(
          query: str,
          top_k: int | None = None,
          source_filter: str | None = None,
      ) -> list[RetrievedDocument]:
          """Search for relevant documents.

          Args:
              query: Search query.
              top_k: Number of results.
              source_filter: Filter by source document.

          Returns:
              List of retrieved documents.
          """
          vector_store = get_vector_store()
          return vector_store.search(
              query=query,
              top_k=top_k or settings.retrieval_top_k,
              filter_source=source_filter,
          )


      def format_documents_for_context(
          documents: list[RetrievedDocument],
          include_scores: bool = False,
      ) -> str:
          """Format retrieved documents for LLM context.

          Args:
              documents: List of retrieved documents.
              include_scores: Whether to include similarity scores.

          Returns:
              Formatted string of documents.
          """
          if not documents:
              return "No relevant documents found."

          formatted_parts = []

          for i, doc in enumerate(documents, 1):
              header = f"[Document {i}]"
              if include_scores:
                  header += f" (Relevance: {doc.score:.2f})"

              source_info = f"Source: {doc.source}"
              if doc.page:
                  source_info += f", Page {doc.page}"

              formatted_parts.append(
                  f"{header}\n{source_info}\n---\n{doc.content}\n"
              )

          return "\n".join(formatted_parts)


      def search_and_format(
          query: str,
          top_k: int | None = None,
          include_scores: bool = True,
      ) -> tuple[str, list[RetrievedDocument]]:
          """Search and format documents in one call.

          Args:
              query: Search query.
              top_k: Number of results.
              include_scores: Whether to include scores.

          Returns:
              Tuple of (formatted string, raw documents).
          """
          documents = search_documents(query, top_k)
          formatted = format_documents_for_context(documents, include_scores)
          return formatted, documents

    verification:
      command: "python -c \"from research_assistant.tools.search import search_documents; print('OK')\""
      expected_output: "OK"

