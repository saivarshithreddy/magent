        ├── py.typed
        ├── cli.py
        ├── config/
        │   ├── __init__.py
        │   ├── settings.py
        │   └── prompts.py
        ├── core/
        │   ├── __init__.py
        │   ├── exceptions.py
        │   └── schemas.py
        ├── services/
        │   ├── __init__.py
        │   ├── embeddings.py
        │   ├── vector_store.py
        │   ├── document_service.py
