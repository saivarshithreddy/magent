  # FILE 9: LLM Service
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/services/llm_service.py"
    description: "LLM interaction service using Ollama"
    dependencies:
      - "langchain-ollama>=0.2.0"
      - "ollama>=0.3.0"
    content: |
      """LLM service for interacting with Ollama."""

      import logging
      from typing import Optional

      from langchain_ollama import ChatOllama
      from langchain_core.messages import HumanMessage, SystemMessage, AIMessage

      from research_assistant.config.settings import settings
      from research_assistant.exceptions import LLMError

      logger = logging.getLogger(__name__)


      class LLMService:
          """Service for LLM interactions using Ollama."""

          def __init__(
              self,
              model: str | None = None,
              temperature: float | None = None,
              base_url: str | None = None,
          ) -> None:
              """Initialize the LLM service.

              Args:
                  model: Model name to use.
                  temperature: Generation temperature.
                  base_url: Ollama API base URL.
              """
              self.model = model or settings.ollama_model
              self.temperature = temperature if temperature is not None else settings.llm_temperature
              self.base_url = base_url or settings.ollama_base_url

              self._llm: ChatOllama | None = None
              logger.info(f"Initialized LLMService with model: {self.model}")

          @property
          def llm(self) -> ChatOllama:
              """Get or create the LLM instance."""
              if self._llm is None:
                  try:
                      self._llm = ChatOllama(
                          model=self.model,
                          temperature=self.temperature,
                          base_url=self.base_url,
                      )
                      logger.info(f"Created ChatOllama instance: {self.model}")
                  except Exception as e:
                      raise LLMError(self.model, f"Failed to initialize: {e}")
              return self._llm

          def generate(
              self,
              prompt: str,
              system_prompt: str | None = None,
          ) -> str:
              """Generate a response from the LLM.

              Args:
                  prompt: User prompt.
                  system_prompt: Optional system prompt.

              Returns:
                  Generated response text.
              """
              try:
                  messages = []

                  if system_prompt:
                      messages.append(SystemMessage(content=system_prompt))

                  messages.append(HumanMessage(content=prompt))

                  logger.debug(f"Generating response for prompt: {prompt[:100]}...")
                  response = self.llm.invoke(messages)

                  return response.content

              except Exception as e:
                  raise LLMError(self.model, f"Generation failed: {e}")

          def generate_with_history(
              self,
              prompt: str,
              history: list[dict],
              system_prompt: str | None = None,
          ) -> str:
              """Generate with conversation history.

              Args:
                  prompt: Current user prompt.
                  history: List of {"role": "user"|"assistant", "content": "..."}.
                  system_prompt: Optional system prompt.

              Returns:
                  Generated response text.
              """
              try:
                  messages = []

                  if system_prompt:
                      messages.append(SystemMessage(content=system_prompt))

                  # Add history
                  for msg in history:
                      if msg["role"] == "user":
                          messages.append(HumanMessage(content=msg["content"]))
                      else:
                          messages.append(AIMessage(content=msg["content"]))

                  # Add current prompt
                  messages.append(HumanMessage(content=prompt))

                  response = self.llm.invoke(messages)
                  return response.content

              except Exception as e:
                  raise LLMError(self.model, f"Generation with history failed: {e}")

          def is_available(self) -> bool:
              """Check if the LLM is available.

              Returns:
                  True if LLM is available.
              """
              try:
                  response = self.generate("Say 'OK' if you can hear me.")
                  return "OK" in response.upper()
              except Exception:
                  return False


      # Global instance
      _llm_service: LLMService | None = None


      def get_llm_service() -> LLMService:
          """Get the global LLM service instance."""
          global _llm_service
          if _llm_service is None:
              _llm_service = LLMService()
          return _llm_service

    verification:
      command: "python -c \"from research_assistant.services.llm_service import LLMService; print('OK')\""
      expected_output: "OK"

