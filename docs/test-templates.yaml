      """Integration tests for agent workflow."""

      import pytest


      @pytest.mark.integration
      class TestAgentWorkflow:
          """Integration tests for the complete agent workflow."""

          def test_complete_workflow_execution(self, research_state, mock_llm, mock_vector_store):
              """Test complete workflow from question to answer."""
              # Setup
              research_state["question"] = "What is machine learning?"

              # Simulate workflow steps
              # 1. Researcher finds documents
              research_state["documents"] = [{"content": "ML is..."}]
              research_state["research_notes"] = "Key findings..."
              research_state["next_agent"] = "writer"

              # 2. Writer creates draft
              research_state["draft_answer"] = "Machine learning is..."
              research_state["sources"] = ["doc1.txt"]
              research_state["next_agent"] = "critic"

              # 3. Critic approves
              research_state["critique"] = "APPROVED"
              research_state["final_answer"] = research_state["draft_answer"]
              research_state["status"] = "complete"

              assert research_state["status"] == "complete"
              assert research_state["final_answer"] != ""

          def test_workflow_with_revision(self, research_state, mock_llm):
              """Test workflow that requires revision."""
              research_state["question"] = "Complex question?"
              research_state["draft_answer"] = "Incomplete answer"
              research_state["critique"] = "NEEDS_REVISION"
              research_state["revision_count"] = 1

              # Simulate revision
              research_state["draft_answer"] = "Improved answer with more detail"
              research_state["critique"] = "APPROVED"
              research_state["final_answer"] = research_state["draft_answer"]

              assert research_state["revision_count"] == 1
              assert "Improved" in research_state["final_answer"]

          def test_workflow_max_revisions(self, research_state):
              """Test that workflow respects max revisions."""
              max_revisions = 3
              research_state["revision_count"] = max_revisions

              # Should stop even without approval
              should_stop = research_state["revision_count"] >= max_revisions
              assert should_stop is True

          @pytest.mark.requires_ollama
          def test_workflow_with_real_llm(self, research_state):
              """Test workflow with actual Ollama LLM."""
              # This test requires Ollama to be running
              # Skip in CI environments
              pass

          def test_error_handling_in_workflow(self, research_state):
              """Test error handling during workflow."""
              research_state["error"] = "LLM connection failed"
              research_state["status"] = "error"

              assert research_state["status"] == "error"
              assert research_state["error"] is not None

