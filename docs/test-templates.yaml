      """Tests for Pydantic schemas."""

      import pytest
      from datetime import datetime


      class TestDocument:
          """Test cases for Document schema."""

          def test_document_creation(self):
              """Test creating a Document."""
              from research_assistant.core.schemas import Document

              doc = Document(
                  content="Test content",
                  metadata={"source": "test.txt"}
              )

              assert doc.content == "Test content"
              assert doc.metadata["source"] == "test.txt"

          def test_document_with_optional_fields(self):
              """Test Document with optional fields."""
              from research_assistant.core.schemas import Document

              doc = Document(
                  content="Test content",
                  metadata={},
                  id="doc-123"
              )

              assert doc.id == "doc-123"


      class TestDocumentChunk:
          """Test cases for DocumentChunk schema."""

          def test_chunk_creation(self):
              """Test creating a DocumentChunk."""
              from research_assistant.core.schemas import DocumentChunk

              chunk = DocumentChunk(
                  content="Chunk content",
                  metadata={"chunk_index": 0},
                  embedding=None
              )

              assert chunk.content == "Chunk content"
              assert chunk.metadata["chunk_index"] == 0

          def test_chunk_with_embedding(self):
              """Test chunk with embedding vector."""
              from research_assistant.core.schemas import DocumentChunk

              embedding = [0.1] * 384
              chunk = DocumentChunk(
                  content="Chunk content",
                  metadata={},
                  embedding=embedding
              )

              assert len(chunk.embedding) == 384


      class TestSearchResult:
          """Test cases for SearchResult schema."""

          def test_search_result_creation(self):
              """Test creating a SearchResult."""
              from research_assistant.core.schemas import SearchResult

              result = SearchResult(
                  content="Found content",
                  metadata={"source": "doc.txt"},
                  score=0.95
              )

              assert result.content == "Found content"
              assert result.score == 0.95

          def test_search_result_ordering(self):
              """Test that results can be sorted by score."""
              from research_assistant.core.schemas import SearchResult

              results = [
                  SearchResult(content="A", metadata={}, score=0.8),
                  SearchResult(content="B", metadata={}, score=0.95),
                  SearchResult(content="C", metadata={}, score=0.7),
              ]

              sorted_results = sorted(results, key=lambda x: x.score, reverse=True)
              assert sorted_results[0].content == "B"

