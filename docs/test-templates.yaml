  test_workflow:
    file: "tests/unit/test_workflow.py"
    content: |
      """Tests for LangGraph Workflow."""

      import pytest
      from unittest.mock import MagicMock, patch


      class TestResearchState:
          """Test cases for ResearchState."""

          def test_initial_state(self, research_state):
              """Test initial state structure."""
              assert "question" in research_state
              assert "documents" in research_state
              assert "research_notes" in research_state
              assert "draft_answer" in research_state
              assert "critique" in research_state
              assert "revision_count" in research_state
              assert "final_answer" in research_state
              assert "sources" in research_state
              assert "next_agent" in research_state
              assert "status" in research_state

          def test_state_update(self, research_state):
              """Test state can be updated."""
              research_state["research_notes"] = "New research notes"
              research_state["status"] = "researching"

              assert research_state["research_notes"] == "New research notes"
              assert research_state["status"] == "researching"


      class TestWorkflowNodes:
          """Test cases for workflow nodes."""

          def test_researcher_node_updates_state(self, research_state):
              """Test researcher node updates state correctly."""
              # Simulate node execution
              research_state["research_notes"] = "Found relevant information"
              research_state["documents"] = [{"content": "doc1"}]
              research_state["next_agent"] = "writer"

              assert len(research_state["documents"]) > 0
              assert research_state["next_agent"] == "writer"

          def test_writer_node_updates_state(self, research_state):
              """Test writer node updates state correctly."""
              research_state["draft_answer"] = "Draft response"
              research_state["sources"] = ["source1.txt"]
              research_state["next_agent"] = "critic"

              assert research_state["draft_answer"] != ""
              assert research_state["next_agent"] == "critic"

          def test_critic_node_approves(self, research_state):
              """Test critic node approval flow."""
              research_state["critique"] = "APPROVED"
              research_state["final_answer"] = research_state["draft_answer"]
              research_state["next_agent"] = "end"
              research_state["status"] = "complete"

              assert research_state["status"] == "complete"

          def test_critic_node_revision(self, research_state):
              """Test critic node revision flow."""
              research_state["critique"] = "NEEDS_REVISION: Add more detail"
              research_state["revision_count"] = 1
              research_state["next_agent"] = "writer"

              assert research_state["revision_count"] == 1
              assert research_state["next_agent"] == "writer"


      class TestWorkflowGraph:
          """Test cases for workflow graph."""

          def test_max_iterations_limit(self, research_state):
              """Test that max iterations is respected."""
              max_iterations = 5
              research_state["revision_count"] = max_iterations

              # Should end after max iterations
              should_end = research_state["revision_count"] >= max_iterations
              assert should_end is True

          def test_workflow_completes(self, research_state):
              """Test complete workflow execution."""
              # Simulate complete workflow
              states = ["researching", "writing", "reviewing", "complete"]

              for state in states:
                  research_state["status"] = state

              assert research_state["status"] == "complete"

