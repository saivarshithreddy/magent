    """
    Pytest Configuration and Fixtures.

    This file contains shared fixtures used across all tests.
    Fixtures are automatically discovered by pytest.
    """

    import os
    import tempfile
    from pathlib import Path
    from typing import Generator
    from unittest.mock import MagicMock, patch

    import pytest

    # Set test environment before importing application modules
    os.environ["RESEARCH_ENVIRONMENT"] = "test"
    os.environ["RESEARCH_DEBUG"] = "true"
    os.environ["RESEARCH_LOG_LEVEL"] = "DEBUG"


    # ============================================================================
    # PATH FIXTURES
    # ============================================================================

    @pytest.fixture
    def fixtures_dir() -> Path:
        """Return the path to test fixtures directory."""
        return Path(__file__).parent / "fixtures"


    @pytest.fixture
    def sample_document_path(fixtures_dir: Path) -> Path:
        """Return path to sample document."""
        return fixtures_dir / "sample_document.txt"


    @pytest.fixture
    def temp_dir() -> Generator[Path, None, None]:
        """Create a temporary directory for tests."""
        with tempfile.TemporaryDirectory() as tmpdir:
            yield Path(tmpdir)


    # ============================================================================
    # SETTINGS FIXTURES
    # ============================================================================

    @pytest.fixture
    def test_settings():
        """Create test settings with mocked values."""
        from research_assistant.config.settings import Settings

        return Settings(
            ollama_base_url="http://localhost:11434",
            ollama_model="llama3.2",
            embedding_model="all-MiniLM-L6-v2",
            chroma_persist_dir="./test_data/vectorstore",
            chunk_size=500,
            chunk_overlap=100,
            max_iterations=3,
            max_revisions=2,
            retrieval_top_k=3,
            environment="test",
            debug=True,
        )


    # ============================================================================
    # MOCK FIXTURES
    # ============================================================================

    @pytest.fixture
    def mock_llm():
        """Create a mocked LLM client."""
        mock = MagicMock()
        mock.invoke.return_value = MagicMock(content="Mocked LLM response")
        mock.generate.return_value = "Mocked generation"
        return mock


    @pytest.fixture
    def mock_embeddings():
        """Create a mocked embedding model."""
        import numpy as np

        mock = MagicMock()
        # Return consistent embeddings for testing
        mock.embed_documents.return_value = [
            np.random.rand(384).tolist() for _ in range(3)
        ]
        mock.embed_query.return_value = np.random.rand(384).tolist()
