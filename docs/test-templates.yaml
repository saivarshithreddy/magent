                  content="APPROVED. The response is accurate."
              )

              response = mock_llm.invoke("Review: ...")

              assert "APPROVED" in response.content

          def test_critic_requests_revision(self, mock_llm):
              """Test that critic can request revision."""
              mock_llm.invoke.return_value = MagicMock(
                  content="NEEDS_REVISION. Missing key details."
              )

              response = mock_llm.invoke("Review: incomplete response")

              assert "NEEDS_REVISION" in response.content


      class TestSupervisorAgent:
          """Test cases for SupervisorAgent."""

          def test_supervisor_routes_to_researcher(self, research_state):
              """Test routing to researcher on new question."""
              assert research_state["next_agent"] == "researcher"

          def test_supervisor_routes_to_writer(self, research_state):
              """Test routing to writer after research."""
              research_state["research_notes"] = "Research complete"
              research_state["next_agent"] = "writer"

              assert research_state["next_agent"] == "writer"

          def test_supervisor_ends_workflow(self, research_state):
              """Test ending workflow on approval."""
              research_state["critique"] = "APPROVED"
              research_state["next_agent"] = "end"

