              """Test that writer includes citations."""
              mock_llm.invoke.return_value = MagicMock(
                  content="The answer is X [1]. Also Y [2]."
              )

              response = mock_llm.invoke("Write response")

              assert "[1]" in response.content


      class TestCriticAgent:
