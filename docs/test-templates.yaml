        """Create a mocked Ollama client."""
        with patch("ollama.Client") as mock_client:
            instance = mock_client.return_value
            instance.chat.return_value = {
                "message": {"content": "Mocked Ollama response"}
            }
            instance.list.return_value = {"models": [{"name": "llama3.2"}]}
            yield instance


    # ============================================================================
    # DATA FIXTURES
    # ============================================================================

    @pytest.fixture
    def sample_document():
        """Create a sample Document object."""
        from research_assistant.core.schemas import Document

        return Document(
            content="This is sample document content for testing.",
            metadata={
                "source": "test_document.txt",
                "filename": "test_document.txt",
                "page": 1,
            }
        )


