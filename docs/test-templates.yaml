        mock = MagicMock()
        mock.similarity_search.return_value = [
            MagicMock(
                page_content="Sample content from document",
                metadata={"source": "test.txt", "page": 1}
            )
        ]
        mock.add_documents.return_value = ["doc_id_1", "doc_id_2"]
        return mock


    @pytest.fixture
