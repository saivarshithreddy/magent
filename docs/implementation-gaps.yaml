      mkdir -p src/research_assistant/{config,core,services,agents,tools,graph,ui/pages}
      mkdir -p tests/{unit,integration,fixtures}
      mkdir -p .streamlit

  step_3:
    action: "Implement Phases 1-9 in order"
    phases:
      - "Phase 1: Foundation (8 files) - config, core"
      - "Phase 2: Services (5 files) - embeddings, vector_store, etc."
      - "Phase 3: Tools (3 files) - search, document"
      - "Phase 4: Agents (6 files) - base, supervisor, researcher, writer, critic"
      - "Phase 5: Workflow (4 files) - LangGraph state and workflow"
      - "Phase 6: UI (7 files) - Streamlit app and pages"
      - "Phase 7: CLI (1 file) - command-line interface"
      - "Phase 8: Tests (15 files) - unit and integration tests"
      - "Phase 9: Polish (1 file) - pre-commit config"
    reference: "docs/PHASED-IMPLEMENTATION.yaml"

  step_4:
    action: "Verify implementation"
    commands:
