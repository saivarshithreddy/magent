implementation_order:
  description: |
    Recommended order for an AI agent to implement the missing pieces.
    Each phase builds on the previous one.

  phase_1:
    name: "Foundation"
    priority: "CRITICAL"
    files:
      - "src/research_assistant/__init__.py"
      - "src/research_assistant/py.typed"
      - "src/research_assistant/config/__init__.py"
      - "src/research_assistant/config/settings.py"
      - "src/research_assistant/config/prompts.py"
      - "src/research_assistant/core/__init__.py"
      - "src/research_assistant/core/exceptions.py"
      - "src/research_assistant/core/schemas.py"
    verification: "python -c 'from research_assistant.config import Settings; print(Settings())'"

  phase_2:
    name: "Services"
    priority: "CRITICAL"
    files:
      - "src/research_assistant/services/__init__.py"
      - "src/research_assistant/services/embeddings.py"
      - "src/research_assistant/services/vector_store.py"
      - "src/research_assistant/services/document_service.py"
      - "src/research_assistant/services/llm_service.py"
    verification: "python -c 'from research_assistant.services import EmbeddingService; print(\"OK\")'"

  phase_3:
    name: "Tools"
    priority: "HIGH"
    files:
      - "src/research_assistant/tools/__init__.py"
      - "src/research_assistant/tools/search.py"
      - "src/research_assistant/tools/document.py"
    verification: "python -c 'from research_assistant.tools import vector_search; print(\"OK\")'"

  phase_4:
    name: "Agents"
    priority: "CRITICAL"
    files:
      - "src/research_assistant/agents/__init__.py"
      - "src/research_assistant/agents/base.py"
      - "src/research_assistant/agents/researcher.py"
      - "src/research_assistant/agents/writer.py"
      - "src/research_assistant/agents/critic.py"
