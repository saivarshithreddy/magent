version: "1.0.0"
last_updated: "2024-12"

# ============================================================================
# CONFLICT RESOLUTION
# ============================================================================
conflict_resolution:
  description: |
    Several documentation files have conflicting structures. This document
    establishes the CANONICAL structure that MUST be used.

  resolved_conflicts:
    - conflict: "Module naming: models/ vs core/"
      resolution: "Use 'core/' for exceptions and schemas"
      reason: "More descriptive and aligns with common Python patterns"

    - conflict: "Module naming: vectorstore/ vs services/"
      resolution: "Use 'services/' for all service classes including vector store"
      reason: "All business logic services in one place"

    - conflict: "Tool naming: search_tools.py vs search.py"
      resolution: "Use 'search.py'"
      reason: "Simpler, consistent with other tool files"

    - conflict: "File naming: pvc.yaml vs pvcs.yaml"
      resolution: "Use 'pvc.yaml' (singular, matches actual file)"
      reason: "Matches what exists in repository"

    - conflict: "File count in implementation-gaps.yaml"
      resolution: "Correct count is 45 missing files total"
      reason: "Recounted based on canonical structure"

    - conflict: "Version pinning: lower bounds vs ranges"
      resolution: "Use lower bounds (>=X.Y.Z) in pyproject.toml"
      reason: "Allows flexibility while ensuring minimum compatibility"

