# ============================================================================
# STORAGE LOCATIONS - WHERE THINGS ARE STORED
# ============================================================================
storage_locations:

  # Project data (within project directory)
  project_data:
    documents:
      path: "data/documents/"
      description: "User-uploaded PDF, TXT, MD files"
      persistence: "Local filesystem"
      backup: "User responsibility"
      gitignored: true
      max_size: "50MB per file"

    vectorstore:
      path: "data/vectorstore/"
      description: "ChromaDB persistent storage (SQLite + parquet)"
      persistence: "Local filesystem"
      backup: "User responsibility"
      gitignored: true
      structure:
        - "chroma.sqlite3 - Metadata database"
        - "*.parquet - Vector embeddings"

  # External storage (outside project directory)
  external_storage:
    ollama_models:
      path_macos: "~/.ollama/models/"
      path_linux: "~/.ollama/models/"
      path_windows: "%USERPROFILE%\\.ollama\\models\\"
      path_container: "/root/.ollama/"
      description: "Ollama LLM model files"
      size_estimate: "2GB - 10GB depending on models"
      models:
        - name: "llama3.2"
          size: "~2GB"
          files: "manifest, blobs (GGUF format)"
        - name: "llama3.2:1b"
          size: "~1.3GB"
        - name: "nomic-embed-text"
          size: "~274MB"

    huggingface_cache:
      path_macos: "~/.cache/huggingface/"
      path_linux: "~/.cache/huggingface/"
      path_windows: "%USERPROFILE%\\.cache\\huggingface\\"
      description: "HuggingFace model cache (sentence-transformers)"
      size_estimate: "100MB - 1GB"
      environment_override: "HF_HOME"
      models:
        - name: "all-MiniLM-L6-v2"
          path: "hub/models--sentence-transformers--all-MiniLM-L6-v2/"
          size: "~90MB"
        - name: "all-mpnet-base-v2"
          path: "hub/models--sentence-transformers--all-mpnet-base-v2/"
          size: "~420MB"

    python_packages:
      path_venv: ".venv/lib/python3.11/site-packages/"
      path_global_macos: "~/Library/Python/3.11/lib/python/site-packages/"
      path_global_linux: "~/.local/lib/python3.11/site-packages/"
      description: "Installed Python packages"
      size_estimate: "500MB - 1GB"

  # Container/K8s storage
  container_storage:
    podman_volumes:
      documents_data:
        mount: "/app/data/documents"
        description: "Document uploads"
      chroma_data:
        mount: "/chroma/chroma"
        description: "ChromaDB data"
      ollama_data:
        mount: "/root/.ollama"
        description: "Ollama models"

    kubernetes_pvcs:
      research-documents-pvc:
        size: "10Gi"
        mount: "/app/data/documents"
      research-vectorstore-pvc:
        size: "10Gi"
        mount: "/app/data/vectorstore"
      ollama-models-pvc:
        size: "20Gi"
        mount: "/root/.ollama"
      chromadb-data-pvc:
        size: "10Gi"
        mount: "/chroma/chroma"

  # VM storage (Multipass)
  vm_storage:
    kubeconfig:
      host_path: "~/.kube/k8s-research-config"
      vm_path: "/etc/rancher/k3s/k3s.yaml"
      description: "Kubernetes configuration"

    k3s_data:
      path: "/var/lib/rancher/k3s/"
      description: "K3s cluster data"

    data_directory:
      path: "/data/"
      description: "Shared data in VM"
      subdirs:
        - "/data/documents"
        - "/data/vectorstore"
        - "/data/ollama"

# ============================================================================
# FILE PURPOSES & CONTENTS
# ============================================================================
file_purposes:

  # Root configuration files
  root_files:
    "pyproject.toml":
      purpose: "Project metadata, dependencies, tool configuration"
      sections:
        - "[project]" - Name, version, description, dependencies
        - "[project.optional-dependencies]" - Dev, prod dependencies
        - "[project.scripts]" - CLI entry points
        - "[build-system]" - Build configuration
        - "[tool.black]" - Code formatter settings
        - "[tool.ruff]" - Linter settings
        - "[tool.mypy]" - Type checker settings
        - "[tool.pytest]" - Test settings
        - "[tool.coverage]" - Coverage settings

    ".env.example":
      purpose: "Template for environment variables"
      copy_to: ".env"
      sections:
        - "LLM Configuration (Ollama)"
        - "Embedding Configuration"
        - "Vector Database (ChromaDB)"
        - "Document Processing"
        - "Agent Configuration"
        - "Application Settings"
        - "Streamlit UI"

    "Makefile":
      purpose: "Build automation and common commands"
      sections:
        - "Development Setup"
        - "Running the Application"
        - "Code Quality"
        - "Testing"
        - "Data Management"
        - "Multipass VM Management"
        - "Podman Container Management"
        - "Kubernetes Deployment"
        - "Dependency Verification"

    ".gitignore":
      purpose: "Git ignore patterns"
      ignores:
        - "Python: __pycache__, *.pyc, .venv, dist, *.egg-info"
        - "IDE: .vscode, .idea"
        - "Environment: .env"
        - "Data: data/documents/*, data/vectorstore/*"
        - "Caches: .pytest_cache, .mypy_cache, .ruff_cache"
        - "Coverage: htmlcov, .coverage"

  # Source code files
  source_files:
    "src/research_assistant/__init__.py":
      purpose: "Package initialization"
      exports:
        - "__version__"
        - "Settings"
        - "ResearchGraph"

    "src/research_assistant/config/settings.py":
      purpose: "Application settings using Pydantic"
      classes:
        - "Settings" - Main settings class with env var loading

    "src/research_assistant/config/prompts.py":
      purpose: "Agent prompt templates"
      constants:
        - "SUPERVISOR_SYSTEM_PROMPT"
        - "RESEARCHER_SYSTEM_PROMPT"
        - "WRITER_SYSTEM_PROMPT"
        - "CRITIC_SYSTEM_PROMPT"

    "src/research_assistant/core/schemas.py":
      purpose: "Pydantic data models"
      classes:
        - "Document"
        - "DocumentChunk"
        - "SearchResult"
        - "AgentResponse"
        - "ChatMessage"

    "src/research_assistant/graph/state.py":
      purpose: "LangGraph state schema"
      classes:
        - "ResearchState" - TypedDict with all state fields

    "src/research_assistant/graph/workflow.py":
      purpose: "Main LangGraph workflow"
      classes:
        - "ResearchGraph" - StateGraph builder and executor

    "src/research_assistant/ui/app.py":
      purpose: "Main Streamlit application"
      functions:
        - "main()" - Entry point
        - "render_sidebar()"
        - "render_chat()"
        - "handle_query()"

  # Infrastructure files
  infrastructure_files:
    "infrastructure/podman/Containerfile":
      purpose: "OCI-compliant container image definition"
      stages:
        - "builder" - Install dependencies
        - "production" - Final minimal image
      base_image: "python:3.11-slim"
      exposes: 8501

    "infrastructure/podman/podman-compose.yaml":
      purpose: "Local development stack"
      services:
        - "research-app" - Main application
        - "ollama" - LLM server
        - "chromadb" - Vector database
        - "ollama-init" - Model downloader

    "infrastructure/multipass/cloud-init.yaml":
      purpose: "VM auto-provisioning configuration"
      installs:
        - "K3s (lightweight Kubernetes)"
        - "Podman, Buildah, Skopeo"
        - "Development tools"

    "infrastructure/kubernetes/base/kustomization.yaml":
      purpose: "Kustomize base configuration"
      resources:
        - "namespace.yaml"
        - "configmap.yaml"
        - "app-deployment.yaml"
        - "ollama-statefulset.yaml"
        - "chromadb-statefulset.yaml"
        - "pvcs.yaml"
        - "ingress.yaml"

# ============================================================================
# CONFIGURATION FILES CONTENT
# ============================================================================
configuration_templates:

  ".streamlit/config.toml":
    purpose: "Streamlit UI configuration"
    content: |
      [server]
      port = 8501
      address = "0.0.0.0"
      headless = true
      runOnSave = true

      [browser]
      gatherUsageStats = false

      [theme]
      primaryColor = "#1f77b4"
      backgroundColor = "#ffffff"
      secondaryBackgroundColor = "#f0f2f6"
      textColor = "#262730"
      font = "sans serif"

  ".pre-commit-config.yaml":
    purpose: "Pre-commit hooks configuration"
    content: |
      repos:
        - repo: https://github.com/pre-commit/pre-commit-hooks
          rev: v4.5.0
          hooks:
            - id: trailing-whitespace
            - id: end-of-file-fixer
            - id: check-yaml
            - id: check-added-large-files

        - repo: https://github.com/psf/black
          rev: 24.1.0
          hooks:
            - id: black

        - repo: https://github.com/astral-sh/ruff-pre-commit
          rev: v0.1.9
          hooks:
            - id: ruff
              args: [--fix]

        - repo: https://github.com/pre-commit/mirrors-mypy
          rev: v1.8.0
          hooks:
            - id: mypy
              additional_dependencies: [pydantic>=2.0]

  "tests/conftest.py":
    purpose: "Pytest fixtures and configuration"
    fixtures:
      - "settings" - Test settings instance
      - "mock_llm" - Mocked LLM client
      - "mock_embeddings" - Mocked embedding model
      - "mock_vector_store" - Mocked ChromaDB
      - "sample_document" - Sample Document object
      - "sample_chunks" - Sample DocumentChunk list
      - "research_state" - Initial ResearchState

# ============================================================================
# SIZE ESTIMATES
# ============================================================================
size_estimates:

  disk_space:
    project_code: "~5MB"
    python_venv: "500MB - 1GB"
    ollama_models: "2GB - 10GB"
    huggingface_models: "100MB - 1GB"
    chromadb_data: "Varies with documents"
    documents: "User dependent"
    total_minimum: "~4GB"
    total_recommended: "~10GB"

  memory_usage:
    idle: "~200MB"
    with_embeddings_loaded: "~500MB"
    during_llm_inference: "2GB - 8GB"
    recommended_system_ram: "16GB"

  container_images:
    research_assistant: "~400MB"
    ollama: "~1GB (without models)"
    chromadb: "~500MB"
    total: "~2GB"

# ============================================================================
# DEPENDENCY GRAPH
# ============================================================================
dependency_graph:
  description: |
    How components depend on each other:

    User Request
         │
         ▼
    ┌─────────────┐
    │ Streamlit UI │ ──────────────────────────────┐
    └─────────────┘                                │
         │                                         │
         ▼                                         │
    ┌─────────────┐     ┌─────────────┐           │
    │  Settings   │◄────│  .env file  │           │
    └─────────────┘     └─────────────┘           │
         │                                         │
         ▼                                         │
    ┌─────────────────────────────────┐           │
    │       ResearchGraph             │           │
    │  (LangGraph StateGraph)         │           │
    └─────────────────────────────────┘           │
         │                                         │
         ├──────────────┬──────────────┤          │
         ▼              ▼              ▼          │
    ┌─────────┐   ┌─────────┐   ┌─────────┐      │
