# ============================================================================
# PROJECT STRUCTURE & VERSION REFERENCE
# ============================================================================
# Project: Student Research Assistant
# Purpose: Complete project structure, versions, and storage locations
# ============================================================================
# This document provides:
# - Complete directory tree with descriptions
# - All version numbers pinned
# - Storage locations for models, data, caches
# - File purposes and contents
# ============================================================================

# ============================================================================
# VERSION MATRIX
# ============================================================================
versions:
  # Project version
  project:
    version: "1.0.0"
    python_requires: ">=3.10,<3.13"
    last_updated: "2024-12"

  # Python runtime
  python:
    minimum: "3.10"
    recommended: "3.11"
    maximum: "3.12"

  # Core framework versions (PINNED)
  core_dependencies:
    langchain: ">=0.3.0,<0.4.0"
    langchain_community: ">=0.3.0,<0.4.0"
    langchain_core: ">=0.3.0,<0.4.0"
    langchain_text_splitters: ">=0.3.0,<0.4.0"
    langgraph: ">=0.2.0,<0.3.0"
    langchain_ollama: ">=0.2.0,<0.3.0"

  # Database & storage versions
  storage:
    chromadb: ">=0.4.0,<0.6.0"
    sentence_transformers: ">=2.2.0,<3.0.0"

  # LLM provider
  llm:
    ollama_package: ">=0.3.0,<1.0.0"
    ollama_server: ">=0.3.0"

  # Document processing
  document_processing:
    pypdf: ">=4.0.0,<5.0.0"
    python_docx: ">=1.0.0,<2.0.0"
    unstructured: ">=0.10.0,<1.0.0"

  # UI framework
  ui:
    streamlit: ">=1.28.0,<2.0.0"

  # Configuration & utilities
  utilities:
    pydantic: ">=2.0.0,<3.0.0"
    pydantic_settings: ">=2.0.0,<3.0.0"
    python_dotenv: ">=1.0.0,<2.0.0"
    pyyaml: ">=6.0.0,<7.0.0"
    aiofiles: ">=23.0.0,<24.0.0"
    httpx: ">=0.25.0,<1.0.0"
    rich: ">=13.0.0,<14.0.0"
    tenacity: ">=8.0.0,<9.0.0"
    structlog: ">=23.0.0,<24.0.0"

  # Development tools
  development:
    pytest: ">=7.4.0,<8.0.0"
    pytest_asyncio: ">=0.21.0,<1.0.0"
    pytest_cov: ">=4.1.0,<5.0.0"
    pytest_mock: ">=3.12.0,<4.0.0"
    black: ">=24.0.0,<25.0.0"
    ruff: ">=0.1.0,<1.0.0"
    mypy: ">=1.7.0,<2.0.0"
    pre_commit: ">=3.6.0,<4.0.0"

  # Infrastructure tools
  infrastructure:
    podman: ">=4.0.0"
    multipass: ">=1.12.0"
    kubectl: ">=1.28.0"
    k3s: ">=1.28.0"
    terraform: ">=1.5.0"

  # Container base images
  container_images:
    python: "python:3.11-slim"
    ollama: "ollama/ollama:latest"
    chromadb: "chromadb/chroma:latest"
    ubuntu: "22.04"

  # AI models
  ai_models:
    llm_primary:
      name: "llama3.2"
      version: "latest"
      size: "~2GB"
    llm_light:
      name: "llama3.2:1b"
      version: "latest"
      size: "~1.3GB"
    embedding_primary:
      name: "all-MiniLM-L6-v2"
      version: "latest"
      size: "~90MB"
      dimensions: 384

