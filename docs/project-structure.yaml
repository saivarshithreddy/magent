# ============================================================================
# INITIALIZATION ORDER
# ============================================================================
initialization_order:
  description: |
    Order in which components should be initialized:

  steps:
    1:
      component: "Environment"
      action: "Load .env file"
      dependencies: []

    2:
      component: "Settings"
      action: "Parse environment variables into Settings class"
      dependencies: ["Environment"]

    3:
      component: "Ollama Server"
      action: "Ensure Ollama is running and models downloaded"
      dependencies: []

    4:
      component: "Embedding Service"
      action: "Load sentence-transformers model"
      dependencies: ["Settings"]

    5:
      component: "Vector Store"
      action: "Initialize ChromaDB client and collection"
      dependencies: ["Settings", "Embedding Service"]

    6:
      component: "LLM Service"
      action: "Initialize Ollama client"
      dependencies: ["Settings", "Ollama Server"]

    7:
      component: "Agents"
      action: "Initialize all agents with LLM and tools"
      dependencies: ["LLM Service", "Vector Store"]

    8:
      component: "Research Graph"
      action: "Build and compile LangGraph workflow"
      dependencies: ["Agents"]

    9:
      component: "Streamlit UI"
      action: "Start web server and render UI"
      dependencies: ["Research Graph"]

