# ============================================================================
# KUBERNETES OVERLAY FILES
# ============================================================================

kubernetes_overlays:
  dev_kustomization:
    file: "infrastructure/kubernetes/overlays/dev/kustomization.yaml"
    content: |
      # Development Environment Overlay
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization

      namespace: research-assistant-dev

      resources:
        - ../../base

      namePrefix: dev-

      commonLabels:
        environment: development

      # Development-specific patches
      patches:
        # Reduce resource requests for development
        - patch: |-
            - op: replace
              path: /spec/template/spec/containers/0/resources/requests/memory
              value: "256Mi"
            - op: replace
              path: /spec/template/spec/containers/0/resources/requests/cpu
              value: "100m"
          target:
            kind: Deployment
            name: research-assistant-app

        # Use single replica in dev
        - patch: |-
            - op: replace
              path: /spec/replicas
              value: 1
          target:
            kind: Deployment

      # Development ConfigMap overrides
      configMapGenerator:
        - name: research-assistant-config
          behavior: merge
          literals:
            - RESEARCH_LOG_LEVEL=DEBUG
            - RESEARCH_DEBUG=true
            - RESEARCH_ENVIRONMENT=development

  prod_kustomization:
    file: "infrastructure/kubernetes/overlays/prod/kustomization.yaml"
    content: |
      # Production Environment Overlay
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization

      namespace: research-assistant

      resources:
        - ../../base

      namePrefix: prod-

      commonLabels:
        environment: production

      # Production-specific patches
      patches:
        # Increase resources for production
        - patch: |-
            - op: replace
              path: /spec/template/spec/containers/0/resources/requests/memory
              value: "1Gi"
            - op: replace
              path: /spec/template/spec/containers/0/resources/requests/cpu
              value: "500m"
            - op: replace
              path: /spec/template/spec/containers/0/resources/limits/memory
              value: "2Gi"
            - op: replace
              path: /spec/template/spec/containers/0/resources/limits/cpu
              value: "1000m"
          target:
            kind: Deployment
            name: research-assistant-app

        # Multiple replicas in production
        - patch: |-
            - op: replace
              path: /spec/replicas
              value: 2
          target:
            kind: Deployment
            name: research-assistant-app

      # Production ConfigMap overrides
      configMapGenerator:
        - name: research-assistant-config
          behavior: merge
          literals:
            - RESEARCH_LOG_LEVEL=INFO
            - RESEARCH_DEBUG=false
            - RESEARCH_ENVIRONMENT=production
            - RESEARCH_LOG_JSON=true

# ============================================================================
# DIRECTORY CREATION SCRIPT
# ============================================================================

directory_creation:
  description: |
    Commands to create all required directories before implementing files.

  bash_script: |
    #!/bin/bash
    # Create all required directories for the project

    echo "Creating directory structure..."

    # Source code directories
    mkdir -p src/research_assistant/{config,core,services,agents,tools,graph,ui/pages}

    # Test directories
    mkdir -p tests/{unit,integration,fixtures}

    # Config directories
    mkdir -p .streamlit

    # Ensure data directories exist
    mkdir -p data/{documents,vectorstore}

    # Create __init__.py files for Python packages
    touch src/research_assistant/__init__.py
    touch src/research_assistant/config/__init__.py
    touch src/research_assistant/core/__init__.py
    touch src/research_assistant/services/__init__.py
    touch src/research_assistant/agents/__init__.py
    touch src/research_assistant/tools/__init__.py
    touch src/research_assistant/graph/__init__.py
    touch src/research_assistant/ui/__init__.py
    touch tests/__init__.py
    touch tests/unit/__init__.py
    touch tests/integration/__init__.py

    # Create py.typed marker
    touch src/research_assistant/py.typed

    echo "Directory structure created successfully!"
    echo ""
    echo "Created directories:"
    find src tests .streamlit -type d 2>/dev/null | head -20

  makefile_target: |
    .PHONY: create-structure
    create-structure: ## Create project directory structure
    	@echo "$(BLUE)Creating directory structure...$(NC)"
    	@mkdir -p src/research_assistant/{config,core,services,agents,tools,graph,ui/pages}
    	@mkdir -p tests/{unit,integration,fixtures}
    	@mkdir -p .streamlit
    	@mkdir -p data/{documents,vectorstore}
    	@touch src/research_assistant/__init__.py
    	@touch src/research_assistant/config/__init__.py
    	@touch src/research_assistant/core/__init__.py
    	@touch src/research_assistant/services/__init__.py
    	@touch src/research_assistant/agents/__init__.py
    	@touch src/research_assistant/tools/__init__.py
    	@touch src/research_assistant/graph/__init__.py
    	@touch src/research_assistant/ui/__init__.py
    	@touch tests/__init__.py
    	@touch tests/unit/__init__.py
    	@touch tests/integration/__init__.py
    	@touch src/research_assistant/py.typed
    	@echo "$(GREEN)Directory structure created!$(NC)"

