  # FILE 12: Researcher Agent
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/agents/researcher.py"
    description: "Researcher agent for finding information"
    content: |
      """Researcher agent for information retrieval and extraction."""

      import logging
      from typing import Any

      from research_assistant.agents.base import BaseAgent
      from research_assistant.config.prompts import (
          RESEARCHER_SYSTEM_PROMPT,
          RESEARCHER_TASK_PROMPT,
      )
      from research_assistant.tools.search import search_and_format
      from research_assistant.core.schemas import RetrievedDocument

      logger = logging.getLogger(__name__)


      class ResearcherAgent(BaseAgent):
          """Agent specialized in research and information retrieval."""

          def __init__(self) -> None:
              """Initialize the researcher agent."""
              super().__init__(
                  name="Researcher",
                  system_prompt=RESEARCHER_SYSTEM_PROMPT,
              )

          def execute(
              self,
              question: str,
              top_k: int = 5,
              **kwargs: Any,
          ) -> dict[str, Any]:
              """Execute research task.

              Args:
                  question: Research question.
                  top_k: Number of documents to retrieve.

              Returns:
                  Dictionary with research findings.
              """
              logger.info(f"[{self.name}] Researching: {question[:100]}...")

              # Search for relevant documents
              formatted_docs, raw_docs = search_and_format(
                  query=question,
                  top_k=top_k,
                  include_scores=True,
              )

              if not raw_docs:
                  logger.warning(f"[{self.name}] No documents found")
                  return {
                      "research_notes": "No relevant documents found in the knowledge base.",
                      "documents_retrieved": 0,
                      "sources": [],
                  }

              # Generate research notes
              prompt = RESEARCHER_TASK_PROMPT.format(
                  question=question,
                  documents=formatted_docs,
              )

              research_notes = self._generate(prompt)

              # Extract sources
              sources = [
                  {"source": doc.source, "page": doc.page, "score": doc.score}
                  for doc in raw_docs
              ]

              logger.info(
                  f"[{self.name}] Research complete: "
                  f"{len(raw_docs)} documents, {len(research_notes)} chars"
              )

              return {
                  "research_notes": research_notes,
                  "documents_retrieved": len(raw_docs),
                  "sources": sources,
                  "raw_documents": raw_docs,
              }

    verification:
      command: "python -c \"from research_assistant.agents.researcher import ResearcherAgent; print('OK')\""
      expected_output: "OK"

