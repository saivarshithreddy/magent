  - file: "src/research_assistant/agents/critic.py"
    description: "Critic agent for quality review"
    content: |
      """Critic agent for reviewing and quality control."""

      import logging
      import re
      from typing import Any

      from research_assistant.agents.base import BaseAgent
      from research_assistant.config.prompts import (
          CRITIC_SYSTEM_PROMPT,
          CRITIC_TASK_PROMPT,
      )

      logger = logging.getLogger(__name__)


      class CriticAgent(BaseAgent):
          """Agent specialized in review and critique."""

          def __init__(self) -> None:
              """Initialize the critic agent."""
              super().__init__(
                  name="Critic",
                  system_prompt=CRITIC_SYSTEM_PROMPT,
              )

          def execute(
              self,
              question: str,
              research_notes: str,
              draft_answer: str,
              **kwargs: Any,
          ) -> dict[str, Any]:
              """Execute critique task.

              Args:
                  question: Original question.
                  research_notes: Research findings.
                  draft_answer: Writer's draft to review.

              Returns:
                  Dictionary with critique results.
              """
              logger.info(f"[{self.name}] Reviewing draft...")

              # Generate critique
              prompt = CRITIC_TASK_PROMPT.format(
                  question=question,
                  research_notes=research_notes,
                  draft_answer=draft_answer,
              )

              critique = self._generate(prompt)

              # Parse verdict from critique
              verdict = self._extract_verdict(critique)

              logger.info(f"[{self.name}] Review complete: {verdict}")

              return {
                  "critique": critique,
                  "verdict": verdict,
                  "needs_revision": verdict == "NEEDS_REVISION",
              }

          def _extract_verdict(self, critique: str) -> str:
              """Extract verdict from critique text.

              Args:
                  critique: Full critique text.

              Returns:
                  APPROVED or NEEDS_REVISION.
              """
              # Look for explicit verdict
              critique_upper = critique.upper()

              # Check for verdict patterns
              if "VERDICT: APPROVED" in critique_upper or "## VERDICT\nAPPROVED" in critique_upper:
                  return "APPROVED"
              elif "VERDICT: NEEDS_REVISION" in critique_upper or "NEEDS REVISION" in critique_upper:
                  return "NEEDS_REVISION"

              # Fallback: look for keywords
              if "APPROVED" in critique_upper and "NEEDS" not in critique_upper:
                  return "APPROVED"

              # Default to needs revision if unclear
              return "NEEDS_REVISION"

    verification:
      command: "python -c \"from research_assistant.agents.critic import CriticAgent; print('OK')\""
      expected_output: "OK"

  # --------------------------------------------------------------------------
  # FILE 15: Supervisor Agent
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/agents/supervisor.py"
    description: "Supervisor agent for workflow orchestration"
    content: |
      """Supervisor agent for orchestrating the workflow."""

      import logging
      from typing import Any, Literal

      from research_assistant.agents.base import BaseAgent
      from research_assistant.config.prompts import (
          SUPERVISOR_SYSTEM_PROMPT,
          SUPERVISOR_DECISION_PROMPT,
      )
      from research_assistant.config.settings import settings

      logger = logging.getLogger(__name__)

      AgentChoice = Literal["RESEARCHER", "WRITER", "CRITIC", "FINISH"]


      class SupervisorAgent(BaseAgent):
          """Agent that orchestrates the multi-agent workflow."""

          VALID_CHOICES = {"RESEARCHER", "WRITER", "CRITIC", "FINISH"}

          def __init__(self) -> None:
              """Initialize the supervisor agent."""
              super().__init__(
                  name="Supervisor",
                  system_prompt=SUPERVISOR_SYSTEM_PROMPT,
              )

          def execute(
              self,
              question: str,
              has_research: bool = False,
              has_draft: bool = False,
              has_critique: bool = False,
              critic_verdict: str = "",
              revision_count: int = 0,
              **kwargs: Any,
          ) -> dict[str, Any]:
              """Decide which agent should work next.

              Args:
                  question: Original question.
                  has_research: Whether research has been done.
                  has_draft: Whether a draft exists.
                  has_critique: Whether critique has been done.
                  critic_verdict: Latest critic verdict.
                  revision_count: Number of revisions done.

              Returns:
                  Dictionary with next agent choice.
              """
              logger.info(f"[{self.name}] Deciding next step...")

              # Rule-based routing (can use LLM for complex cases)
              next_agent = self._rule_based_routing(
                  has_research=has_research,
                  has_draft=has_draft,
                  has_critique=has_critique,
                  critic_verdict=critic_verdict,
                  revision_count=revision_count,
              )

              logger.info(f"[{self.name}] Decision: {next_agent}")

              return {
                  "next_agent": next_agent,
                  "reasoning": self._get_reasoning(next_agent),
              }

          def _rule_based_routing(
              self,
              has_research: bool,
              has_draft: bool,
              has_critique: bool,
              critic_verdict: str,
              revision_count: int,
          ) -> AgentChoice:
              """Apply rule-based routing logic.

              Args:
                  has_research: Whether research exists.
                  has_draft: Whether draft exists.
                  has_critique: Whether critique exists.
                  critic_verdict: Latest verdict.
                  revision_count: Current revision count.

              Returns:
                  Next agent to execute.
              """
              max_revisions = settings.max_revisions

              # Rule 1: No research yet -> RESEARCHER
              if not has_research:
                  return "RESEARCHER"

              # Rule 2: Has research, no draft -> WRITER
              if has_research and not has_draft:
                  return "WRITER"

              # Rule 3: Has draft, no critique -> CRITIC
              if has_draft and not has_critique:
                  return "CRITIC"

              # Rule 4: Critic approved -> FINISH
              if critic_verdict == "APPROVED":
                  return "FINISH"

              # Rule 5: Needs revision and under limit -> WRITER
              if critic_verdict == "NEEDS_REVISION" and revision_count < max_revisions:
                  return "WRITER"

              # Rule 6: Max revisions reached -> FINISH
              if revision_count >= max_revisions:
                  return "FINISH"

              # Default: FINISH
              return "FINISH"

          def _llm_based_routing(
              self,
              question: str,
              has_research: bool,
              has_draft: bool,
              has_critique: bool,
              critic_verdict: str,
              revision_count: int,
          ) -> AgentChoice:
              """Use LLM for routing decisions (for complex cases).

              Args:
                  question: Original question.
                  has_research: Whether research exists.
                  has_draft: Whether draft exists.
                  has_critique: Whether critique exists.
                  critic_verdict: Latest verdict.
                  revision_count: Current revision count.

              Returns:
                  Next agent to execute.
              """
              prompt = SUPERVISOR_DECISION_PROMPT.format(
                  question=question,
                  has_research=has_research,
                  has_draft=has_draft,
                  has_critique=has_critique,
                  critic_verdict=critic_verdict or "N/A",
                  revision_count=revision_count,
                  max_revisions=settings.max_revisions,
              )

              response = self._generate(prompt).strip().upper()

              # Extract agent choice from response
              for choice in self.VALID_CHOICES:
                  if choice in response:
                      return choice

              # Default fallback
              return "FINISH"

          def _get_reasoning(self, choice: AgentChoice) -> str:
              """Get human-readable reasoning for the choice.

              Args:
                  choice: The agent choice made.

              Returns:
                  Reasoning string.
              """
              reasoning_map = {
                  "RESEARCHER": "Need to gather information from documents",
                  "WRITER": "Ready to synthesize research into response",
                  "CRITIC": "Draft ready for quality review",
                  "FINISH": "Task complete, returning final answer",
              }
              return reasoning_map.get(choice, "Decision made")

    verification:
