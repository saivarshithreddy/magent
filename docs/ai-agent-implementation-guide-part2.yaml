  # FILE 13: Writer Agent
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/agents/writer.py"
    description: "Writer agent for synthesizing responses"
    content: |
      """Writer agent for synthesizing research into responses."""

      import logging
      from typing import Any

      from research_assistant.agents.base import BaseAgent
      from research_assistant.config.prompts import (
          WRITER_SYSTEM_PROMPT,
          WRITER_TASK_PROMPT,
          WRITER_REVISION_INSTRUCTIONS,
      )

      logger = logging.getLogger(__name__)


      class WriterAgent(BaseAgent):
          """Agent specialized in writing and synthesis."""

          def __init__(self) -> None:
              """Initialize the writer agent."""
              super().__init__(
                  name="Writer",
                  system_prompt=WRITER_SYSTEM_PROMPT,
              )

          def execute(
              self,
              question: str,
              research_notes: str,
              critique: str | None = None,
              **kwargs: Any,
          ) -> dict[str, Any]:
              """Execute writing task.

              Args:
                  question: Original question.
                  research_notes: Research findings from researcher.
                  critique: Optional critique for revision.

              Returns:
                  Dictionary with draft answer.
              """
              is_revision = critique is not None
              task_type = "revision" if is_revision else "initial draft"
              logger.info(f"[{self.name}] Writing {task_type}...")

              # Prepare revision instructions if needed
              revision_instructions = ""
              if critique:
                  revision_instructions = WRITER_REVISION_INSTRUCTIONS.format(
                      critique=critique
                  )

              # Generate the response
              prompt = WRITER_TASK_PROMPT.format(
                  question=question,
                  research_notes=research_notes,
                  revision_instructions=revision_instructions,
              )

              draft_answer = self._generate(prompt)

              logger.info(
                  f"[{self.name}] Draft complete: {len(draft_answer)} chars"
              )

              return {
                  "draft_answer": draft_answer,
                  "is_revision": is_revision,
              }

    verification:
      command: "python -c \"from research_assistant.agents.writer import WriterAgent; print('OK')\""
      expected_output: "OK"

