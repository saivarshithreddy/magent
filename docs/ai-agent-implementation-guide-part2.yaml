  - file: "src/research_assistant/agents/base.py"
    description: "Base agent class for all agents"
    content: |
      """Base agent class."""

      import logging
      from abc import ABC, abstractmethod
      from typing import Any

      from research_assistant.services.llm_service import get_llm_service, LLMService

      logger = logging.getLogger(__name__)


      class BaseAgent(ABC):
          """Abstract base class for all agents."""

          def __init__(
              self,
              name: str,
              system_prompt: str,
              llm_service: LLMService | None = None,
          ) -> None:
              """Initialize the agent.

              Args:
                  name: Agent name for logging.
                  system_prompt: System prompt for the agent.
                  llm_service: Optional LLM service instance.
              """
              self.name = name
              self.system_prompt = system_prompt
              self.llm = llm_service or get_llm_service()
              logger.info(f"Initialized agent: {self.name}")

          @abstractmethod
          def execute(self, **kwargs: Any) -> dict[str, Any]:
              """Execute the agent's task.

              Args:
                  **kwargs: Task-specific arguments.

              Returns:
                  Dictionary with results.
              """
              pass

          def _generate(self, prompt: str) -> str:
              """Generate response using LLM.

              Args:
                  prompt: User prompt.

              Returns:
                  Generated response.
              """
              logger.debug(f"[{self.name}] Generating response...")
              response = self.llm.generate(
                  prompt=prompt,
                  system_prompt=self.system_prompt,
              )
              logger.debug(f"[{self.name}] Response generated: {len(response)} chars")
              return response

          def __repr__(self) -> str:
              return f"{self.__class__.__name__}(name='{self.name}')"

    verification:
      command: "python -c \"from research_assistant.agents.base import BaseAgent; print('OK')\""
      expected_output: "OK"

