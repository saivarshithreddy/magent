  # --------------------------------------------------------------------------
  - file: "src/research_assistant/graph/state.py"
    description: "LangGraph state definition"
    content: |
      """LangGraph state definition for the research workflow."""

      from typing import Annotated, Literal
      from typing_extensions import TypedDict

      from langgraph.graph.message import add_messages


      class ResearchState(TypedDict, total=False):
          """State schema for the research workflow.

          This state is passed between all nodes in the graph.
          """

          # Input
          question: str  # The user's research question

          # Research phase
          research_notes: str  # Output from researcher agent
          documents_retrieved: int  # Number of documents found
          sources: list[dict]  # Source information

          # Writing phase
          draft_answer: str  # Current draft from writer
          revision_count: int  # Number of revisions made

          # Review phase
          critique: str  # Output from critic agent
          critic_verdict: str  # APPROVED or NEEDS_REVISION

          # Final output
          final_answer: str  # The approved final answer

          # Workflow control
          next_agent: Literal["RESEARCHER", "WRITER", "CRITIC", "FINISH"]
          iteration: int  # Current iteration count
          error: str | None  # Any error message


      def create_initial_state(question: str) -> ResearchState:
          """Create the initial state for a new research task.

          Args:
              question: The user's research question.

          Returns:
              Initial state dictionary.
          """
          return ResearchState(
              question=question,
              research_notes="",
              documents_retrieved=0,
              sources=[],
              draft_answer="",
              revision_count=0,
              critique="",
              critic_verdict="",
              final_answer="",
              next_agent="RESEARCHER",
              iteration=0,
              error=None,
          )

    verification:
      command: "python -c \"from research_assistant.graph.state import ResearchState, create_initial_state; print('OK')\""
      expected_output: "OK"

  # --------------------------------------------------------------------------
  # FILE 18: Graph Nodes
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/graph/nodes.py"
    description: "LangGraph node functions"
    content: |
      """LangGraph node functions for the research workflow."""

      import logging
      from typing import Any

      from research_assistant.graph.state import ResearchState
      from research_assistant.agents import (
          SupervisorAgent,
          ResearcherAgent,
          WriterAgent,
          CriticAgent,
      )
      from research_assistant.config.settings import settings

      logger = logging.getLogger(__name__)

      # Initialize agents (lazy loaded)
      _supervisor: SupervisorAgent | None = None
      _researcher: ResearcherAgent | None = None
      _writer: WriterAgent | None = None
      _critic: CriticAgent | None = None


      def get_supervisor() -> SupervisorAgent:
          global _supervisor
          if _supervisor is None:
              _supervisor = SupervisorAgent()
          return _supervisor


      def get_researcher() -> ResearcherAgent:
          global _researcher
          if _researcher is None:
              _researcher = ResearcherAgent()
          return _researcher


      def get_writer() -> WriterAgent:
          global _writer
          if _writer is None:
              _writer = WriterAgent()
          return _writer


      def get_critic() -> CriticAgent:
          global _critic
          if _critic is None:
              _critic = CriticAgent()
          return _critic


      def supervisor_node(state: ResearchState) -> dict[str, Any]:
          """Supervisor node - decides which agent to run next.

          Args:
              state: Current workflow state.

          Returns:
              Updated state with next_agent decision.
          """
          logger.info("=== SUPERVISOR NODE ===")

          supervisor = get_supervisor()

          result = supervisor.execute(
              question=state["question"],
              has_research=bool(state.get("research_notes")),
              has_draft=bool(state.get("draft_answer")),
              has_critique=bool(state.get("critique")),
              critic_verdict=state.get("critic_verdict", ""),
              revision_count=state.get("revision_count", 0),
          )

          return {
              "next_agent": result["next_agent"],
              "iteration": state.get("iteration", 0) + 1,
          }


      def researcher_node(state: ResearchState) -> dict[str, Any]:
          """Researcher node - retrieves and analyzes documents.

          Args:
              state: Current workflow state.

          Returns:
              Updated state with research findings.
          """
          logger.info("=== RESEARCHER NODE ===")

          researcher = get_researcher()

          result = researcher.execute(
              question=state["question"],
              top_k=settings.retrieval_top_k,
          )

          return {
              "research_notes": result["research_notes"],
              "documents_retrieved": result["documents_retrieved"],
              "sources": result["sources"],
          }


      def writer_node(state: ResearchState) -> dict[str, Any]:
          """Writer node - creates or revises the response.

          Args:
              state: Current workflow state.

          Returns:
              Updated state with draft answer.
          """
          logger.info("=== WRITER NODE ===")

          writer = get_writer()

          # Pass critique if this is a revision
          critique = None
          if state.get("critic_verdict") == "NEEDS_REVISION":
              critique = state.get("critique")

          result = writer.execute(
              question=state["question"],
              research_notes=state["research_notes"],
              critique=critique,
          )

          # Increment revision count if this is a revision
          revision_count = state.get("revision_count", 0)
          if result.get("is_revision"):
              revision_count += 1

          return {
              "draft_answer": result["draft_answer"],
              "revision_count": revision_count,
              # Reset critique after revision
              "critique": "" if result.get("is_revision") else state.get("critique", ""),
              "critic_verdict": "" if result.get("is_revision") else state.get("critic_verdict", ""),
          }


      def critic_node(state: ResearchState) -> dict[str, Any]:
          """Critic node - reviews the draft response.

          Args:
              state: Current workflow state.

          Returns:
              Updated state with critique.
          """
          logger.info("=== CRITIC NODE ===")

          critic = get_critic()

          result = critic.execute(
              question=state["question"],
              research_notes=state["research_notes"],
              draft_answer=state["draft_answer"],
          )

          return {
              "critique": result["critique"],
              "critic_verdict": result["verdict"],
          }


      def finalize_node(state: ResearchState) -> dict[str, Any]:
          """Finalize node - prepares the final answer.

          Args:
              state: Current workflow state.

          Returns:
              Updated state with final answer.
          """
          logger.info("=== FINALIZE NODE ===")

          # Use the current draft as the final answer
          final_answer = state.get("draft_answer", "")

          if not final_answer:
              final_answer = "Unable to generate a response. Please try again."

          return {
              "final_answer": final_answer,
          }


      def route_from_supervisor(state: ResearchState) -> str:
          """Route to the next node based on supervisor decision.

          Args:
              state: Current workflow state.

          Returns:
              Name of the next node.
          """
          next_agent = state.get("next_agent", "FINISH")

          # Check iteration limit
          if state.get("iteration", 0) >= settings.max_iterations:
              logger.warning("Max iterations reached, finishing")
              return "finalize"

          route_map = {
              "RESEARCHER": "researcher",
              "WRITER": "writer",
              "CRITIC": "critic",
              "FINISH": "finalize",
          }

          return route_map.get(next_agent, "finalize")

    verification:
      command: "python -c \"from research_assistant.graph.nodes import supervisor_node, researcher_node, writer_node, critic_node; print('OK')\""
      expected_output: "OK"

  # --------------------------------------------------------------------------
  # FILE 19: Graph Workflow
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/graph/workflow.py"
    description: "LangGraph workflow definition"
    dependencies:
      - "langgraph>=0.2.0"
    content: |
      """LangGraph workflow for multi-agent research."""

      import logging
      from typing import Any

      from langgraph.graph import StateGraph, END

      from research_assistant.graph.state import ResearchState, create_initial_state
      from research_assistant.graph.nodes import (
          supervisor_node,
          researcher_node,
          writer_node,
          critic_node,
          finalize_node,
          route_from_supervisor,
      )

      logger = logging.getLogger(__name__)


      def create_research_workflow() -> StateGraph:
          """Create the research workflow graph.

          Returns:
              Compiled StateGraph ready for execution.
          """
          logger.info("Creating research workflow graph...")

          # Create the graph with our state schema
          workflow = StateGraph(ResearchState)

          # Add nodes
          workflow.add_node("supervisor", supervisor_node)
          workflow.add_node("researcher", researcher_node)
          workflow.add_node("writer", writer_node)
          workflow.add_node("critic", critic_node)
          workflow.add_node("finalize", finalize_node)

          # Set entry point
          workflow.set_entry_point("supervisor")

          # Add conditional edges from supervisor
          workflow.add_conditional_edges(
              "supervisor",
              route_from_supervisor,
              {
                  "researcher": "researcher",
                  "writer": "writer",
                  "critic": "critic",
                  "finalize": "finalize",
              },
          )

          # Add edges back to supervisor after each agent
          workflow.add_edge("researcher", "supervisor")
          workflow.add_edge("writer", "supervisor")
          workflow.add_edge("critic", "supervisor")

          # Finalize goes to END
          workflow.add_edge("finalize", END)

          # Compile the graph
          compiled = workflow.compile()
          logger.info("Research workflow graph compiled successfully")

          return compiled


      class ResearchWorkflow:
          """High-level interface for the research workflow."""

          def __init__(self) -> None:
              """Initialize the workflow."""
              self._graph = None
              logger.info("ResearchWorkflow initialized")

          @property
          def graph(self) -> StateGraph:
              """Lazy load the compiled graph."""
              if self._graph is None:
                  self._graph = create_research_workflow()
              return self._graph

          def run(self, question: str) -> dict[str, Any]:
              """Run the research workflow for a question.

              Args:
                  question: The research question.

              Returns:
                  Final state with the answer.
              """
              logger.info(f"Starting research workflow for: {question[:100]}...")

              # Create initial state
              initial_state = create_initial_state(question)

              # Run the workflow
              final_state = self.graph.invoke(initial_state)

              logger.info("Research workflow completed")

              return {
                  "question": question,
                  "answer": final_state.get("final_answer", ""),
                  "sources": final_state.get("sources", []),
                  "iterations": final_state.get("iteration", 0),
                  "revisions": final_state.get("revision_count", 0),
              }

          def run_with_streaming(self, question: str):
              """Run workflow with streaming updates.

              Args:
                  question: The research question.

              Yields:
                  State updates as they occur.
              """
              logger.info(f"Starting streaming workflow for: {question[:100]}...")

              initial_state = create_initial_state(question)

              for state_update in self.graph.stream(initial_state):
                  yield state_update


      # Global workflow instance
      _workflow: ResearchWorkflow | None = None


      def get_research_workflow() -> ResearchWorkflow:
          """Get the global research workflow instance."""
          global _workflow
          if _workflow is None:
              _workflow = ResearchWorkflow()
          return _workflow

    verification:
      command: "python -c \"from research_assistant.graph.workflow import ResearchWorkflow; print('OK')\""
      expected_output: "OK"

