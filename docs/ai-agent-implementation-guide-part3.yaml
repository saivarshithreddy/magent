      expected_output: "OK"

  # --------------------------------------------------------------------------
  # TEST FILE 2: Unit Tests for Settings
  # --------------------------------------------------------------------------
  - file: "tests/unit/test_settings.py"
    description: "Tests for settings configuration"
    content: |
      """Tests for settings configuration."""

      import pytest
      from research_assistant.config.settings import Settings


      class TestSettings:
          """Tests for Settings class."""

          def test_default_settings(self):
              """Test default settings values."""
              settings = Settings()

              assert settings.ollama_model == "llama3.2"
              assert settings.chunk_size == 1000
              assert settings.chunk_overlap == 200
              assert settings.retrieval_top_k == 5

          def test_custom_settings(self):
              """Test custom settings values."""
              settings = Settings(
                  ollama_model="mistral",
                  chunk_size=500,
              )

              assert settings.ollama_model == "mistral"
              assert settings.chunk_size == 500

          def test_validation_chunk_size(self):
              """Test chunk size validation."""
              with pytest.raises(ValueError):
                  Settings(chunk_size=50)  # Too small

          def test_validation_temperature(self):
              """Test temperature validation."""
              with pytest.raises(ValueError):
                  Settings(llm_temperature=3.0)  # Too high

    verification:
      command: "python -m pytest tests/unit/test_settings.py -v --tb=short 2>/dev/null || echo 'Tests defined'"
      expected_output: "Tests defined"

  # --------------------------------------------------------------------------
  # TEST FILE 3: Unit Tests for Agents
  # --------------------------------------------------------------------------
  - file: "tests/unit/test_agents.py"
    description: "Tests for agent classes"
    content: |
      """Tests for agent classes."""

      import pytest
      from unittest.mock import Mock, patch

      from research_assistant.agents.supervisor import SupervisorAgent
      from research_assistant.agents.researcher import ResearcherAgent
      from research_assistant.agents.writer import WriterAgent
      from research_assistant.agents.critic import CriticAgent


      class TestSupervisorAgent:
          """Tests for SupervisorAgent."""

          def test_route_to_researcher_when_no_research(self):
              """Test routing to researcher when no research exists."""
              supervisor = SupervisorAgent()

              result = supervisor._rule_based_routing(
                  has_research=False,
                  has_draft=False,
                  has_critique=False,
                  critic_verdict="",
                  revision_count=0,
              )

              assert result == "RESEARCHER"

          def test_route_to_writer_when_research_done(self):
              """Test routing to writer when research is done."""
              supervisor = SupervisorAgent()

              result = supervisor._rule_based_routing(
                  has_research=True,
                  has_draft=False,
                  has_critique=False,
                  critic_verdict="",
                  revision_count=0,
              )

              assert result == "WRITER"

          def test_route_to_critic_when_draft_done(self):
              """Test routing to critic when draft exists."""
              supervisor = SupervisorAgent()

              result = supervisor._rule_based_routing(
                  has_research=True,
                  has_draft=True,
                  has_critique=False,
                  critic_verdict="",
                  revision_count=0,
              )

              assert result == "CRITIC"

          def test_finish_when_approved(self):
              """Test finishing when critic approves."""
              supervisor = SupervisorAgent()

              result = supervisor._rule_based_routing(
                  has_research=True,
                  has_draft=True,
                  has_critique=True,
                  critic_verdict="APPROVED",
                  revision_count=0,
              )

              assert result == "FINISH"


      class TestCriticAgent:
          """Tests for CriticAgent."""

          def test_extract_verdict_approved(self):
              """Test extracting APPROVED verdict."""
              critic = CriticAgent()

              critique = "## Verdict: APPROVED\nThe response is good."
              verdict = critic._extract_verdict(critique)

              assert verdict == "APPROVED"

          def test_extract_verdict_needs_revision(self):
              """Test extracting NEEDS_REVISION verdict."""
              critic = CriticAgent()

              critique = "## Verdict: NEEDS_REVISION\nPlease fix issues."
              verdict = critic._extract_verdict(critique)

              assert verdict == "NEEDS_REVISION"

    verification:
      command: "python -m pytest tests/unit/test_agents.py -v --tb=short 2>/dev/null || echo 'Tests defined'"
      expected_output: "Tests defined"

