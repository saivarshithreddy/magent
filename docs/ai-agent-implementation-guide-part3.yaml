# ============================================================================
# EXECUTION ORDER AND COMMANDS
# ============================================================================
execution_guide:

  step_1_setup:
    description: "Initial project setup"
    commands:
      - "mkdir -p src/research_assistant/{config,core,services,tools,agents,graph,ui}"
      - "mkdir -p tests/{unit,integration,fixtures}"
      - "mkdir -p data/{documents,chroma_db}"
      - "touch src/research_assistant/__init__.py"
      - "pip install -e ."

  step_2_create_files:
    description: "Create all source files in order"
    order:
      - "config/settings.py"
      - "config/prompts.py"
      - "exceptions.py"
      - "core/schemas.py"
      - "services/embeddings.py"
      - "services/vector_store.py"
      - "services/document_service.py"
      - "services/llm_service.py"
      - "tools/search.py"
      - "agents/base.py"
      - "agents/researcher.py"
      - "agents/writer.py"
      - "agents/critic.py"
      - "agents/supervisor.py"
      - "graph/state.py"
      - "graph/nodes.py"
      - "graph/workflow.py"
      - "ui/app.py"
      - "cli.py"

  step_3_verify:
    description: "Verify each component"
    command: |
      python -c "
      # Test all imports
      from research_assistant.config import settings
      from research_assistant.core import DocumentChunk
      from research_assistant.services import get_vector_store, get_document_service, get_llm_service
      from research_assistant.tools import search_documents
      from research_assistant.agents import SupervisorAgent, ResearcherAgent, WriterAgent, CriticAgent
      from research_assistant.graph import get_research_workflow
      print('All components verified!')
      "

  step_4_run:
    description: "Run the application"
    options:
      streamlit: "streamlit run src/research_assistant/ui/app.py"
      cli_interactive: "python -m research_assistant.cli interactive"
      cli_ingest: "python -m research_assistant.cli ingest --dir data/documents"
      cli_query: 'python -m research_assistant.cli query "Your question here"'

# ============================================================================
# TROUBLESHOOTING GUIDE
# ============================================================================
troubleshooting:

  - issue: "ModuleNotFoundError: No module named 'research_assistant'"
    solution: |
      Run: pip install -e .
      Or add src to PYTHONPATH: export PYTHONPATH="${PYTHONPATH}:./src"

  - issue: "Connection refused to localhost:11434"
    solution: |
      Start Ollama: ollama serve
      Pull model: ollama pull llama3.2

  - issue: "No documents found in knowledge base"
    solution: |
      Ingest documents first:
      python -m research_assistant.cli ingest --dir data/documents

  - issue: "ChromaDB permission error"
    solution: |
      Check directory permissions:
      chmod -R 755 data/chroma_db

  - issue: "Out of memory error"
    solution: |
      Reduce chunk_size in settings
      Use smaller embedding model
      Process fewer documents at once

  - issue: "Slow response times"
    solution: |
      Use GPU for embeddings: RESEARCH_EMBEDDING_DEVICE=cuda
      Reduce retrieval_top_k
      Use smaller LLM model

