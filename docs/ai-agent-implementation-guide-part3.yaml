  # FILE 21: Streamlit UI Application
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/ui/app.py"
    description: "Main Streamlit application"
    dependencies:
      - "streamlit>=1.28.0"
    content: |
      """Streamlit UI for the Research Assistant."""

      import streamlit as st
      import logging
      from pathlib import Path

      from research_assistant.config.settings import settings
      from research_assistant.services.document_service import get_document_service
      from research_assistant.services.vector_store import get_vector_store
      from research_assistant.graph.workflow import get_research_workflow

      # Configure logging
      logging.basicConfig(level=getattr(logging, settings.log_level))
      logger = logging.getLogger(__name__)

      # Page configuration
      st.set_page_config(
          page_title="Research Assistant",
          page_icon="📚",
          layout="wide",
          initial_sidebar_state="expanded",
      )


      def init_session_state():
          """Initialize session state variables."""
          if "messages" not in st.session_state:
              st.session_state.messages = []
          if "documents_loaded" not in st.session_state:
              st.session_state.documents_loaded = []


      def render_sidebar():
          """Render the sidebar with document management."""
          with st.sidebar:
              st.title("📚 Research Assistant")
              st.markdown("---")

              # Document Upload Section
              st.subheader("📄 Upload Documents")

              uploaded_files = st.file_uploader(
                  "Upload PDF or Text files",
                  type=["pdf", "txt", "md"],
                  accept_multiple_files=True,
                  help="Upload research papers, articles, or documents",
              )

              if uploaded_files:
                  if st.button("Process Documents", type="primary"):
                      process_uploaded_files(uploaded_files)

              st.markdown("---")

              # Document Stats
              st.subheader("📊 Knowledge Base")
              try:
                  vector_store = get_vector_store()
                  stats = vector_store.get_stats()
                  st.metric("Documents Indexed", stats["document_count"])

                  if st.session_state.documents_loaded:
                      st.write("**Loaded files:**")
                      for doc in st.session_state.documents_loaded[-5:]:
                          st.text(f"• {doc}")
              except Exception as e:
                  st.warning("Vector store not initialized")

              st.markdown("---")

              # Settings
              st.subheader("⚙️ Settings")
              st.text(f"Model: {settings.ollama_model}")
              st.text(f"Temperature: {settings.llm_temperature}")

              # Clear options
              if st.button("Clear Chat History"):
                  st.session_state.messages = []
                  st.rerun()

              if st.button("Clear Knowledge Base"):
                  try:
                      vector_store = get_vector_store()
                      vector_store.clear()
                      st.session_state.documents_loaded = []
                      st.success("Knowledge base cleared!")
                      st.rerun()
                  except Exception as e:
                      st.error(f"Error: {e}")


      def process_uploaded_files(uploaded_files):
          """Process uploaded files and add to vector store."""
          doc_service = get_document_service()

          progress_bar = st.progress(0)
          status_text = st.empty()

          total_files = len(uploaded_files)
          processed = 0
          errors = []

          for i, uploaded_file in enumerate(uploaded_files):
              status_text.text(f"Processing: {uploaded_file.name}")

              try:
                  # Process the file
                  chunks = doc_service.process_uploaded_file(
                      file=uploaded_file,
                      filename=uploaded_file.name,
                  )

                  # Add to vector store
                  vector_store = get_vector_store()
                  vector_store.add_documents(chunks)

                  st.session_state.documents_loaded.append(uploaded_file.name)
                  processed += 1

              except Exception as e:
                  errors.append(f"{uploaded_file.name}: {str(e)}")
                  logger.error(f"Error processing {uploaded_file.name}: {e}")

              progress_bar.progress((i + 1) / total_files)

          status_text.empty()
          progress_bar.empty()

          if processed > 0:
              st.success(f"✅ Processed {processed} file(s) successfully!")

          if errors:
              st.error("❌ Some files failed to process:")
              for error in errors:
                  st.text(error)


      def render_chat_interface():
          """Render the main chat interface."""
          st.title("🔬 Research Assistant")
          st.markdown("Ask questions about your uploaded documents")

          # Display chat history
          for message in st.session_state.messages:
              with st.chat_message(message["role"]):
                  st.markdown(message["content"])

          # Chat input
          if prompt := st.chat_input("Ask a research question..."):
              # Add user message
              st.session_state.messages.append({"role": "user", "content": prompt})

              with st.chat_message("user"):
                  st.markdown(prompt)

              # Generate response
              with st.chat_message("assistant"):
                  response_placeholder = st.empty()
                  status_placeholder = st.empty()

                  try:
                      # Check if we have documents
                      vector_store = get_vector_store()
                      stats = vector_store.get_stats()

                      if stats["document_count"] == 0:
                          response = "⚠️ No documents in the knowledge base. Please upload some documents first using the sidebar."
                      else:
                          status_placeholder.info("🔍 Researching...")

                          # Run the workflow
                          workflow = get_research_workflow()
                          result = workflow.run(prompt)

                          response = result["answer"]

                          # Add metadata
                          if result.get("sources"):
                              response += "\n\n---\n**Sources used:**\n"
                              for source in result["sources"][:5]:
                                  response += f"- {source['source']}"
                                  if source.get('page'):
                                      response += f" (Page {source['page']})"
                                  response += "\n"

                          status_placeholder.empty()

                  except Exception as e:
                      logger.error(f"Error generating response: {e}")
                      response = f"❌ Error generating response: {str(e)}\n\nPlease make sure Ollama is running with the model '{settings.ollama_model}'."
                      status_placeholder.empty()

                  response_placeholder.markdown(response)

              # Add assistant message to history
              st.session_state.messages.append({"role": "assistant", "content": response})


      def main():
          """Main application entry point."""
          init_session_state()
          render_sidebar()
          render_chat_interface()


      if __name__ == "__main__":
          main()

    verification:
      command: "python -c \"from research_assistant.ui.app import main; print('OK')\""
      expected_output: "OK"

  # --------------------------------------------------------------------------
  # FILE 22: CLI Interface
  # --------------------------------------------------------------------------
  - file: "src/research_assistant/cli.py"
    description: "Command-line interface"
    content: |
      """Command-line interface for the Research Assistant."""

      import argparse
      import logging
      import sys
      from pathlib import Path

      from rich.console import Console
      from rich.markdown import Markdown
      from rich.panel import Panel
      from rich.progress import Progress

      from research_assistant.config.settings import settings
      from research_assistant.services.document_service import get_document_service
      from research_assistant.services.vector_store import get_vector_store
      from research_assistant.graph.workflow import get_research_workflow

      console = Console()

      # Configure logging
      logging.basicConfig(
          level=getattr(logging, settings.log_level),
          format="%(asctime)s | %(levelname)s | %(name)s | %(message)s",
      )
      logger = logging.getLogger(__name__)


      def cmd_ingest(args):
          """Ingest documents from a directory."""
          directory = Path(args.dir)

          if not directory.exists():
              console.print(f"[red]Directory not found: {directory}[/red]")
              return 1

          console.print(f"[blue]Ingesting documents from: {directory}[/blue]")

          doc_service = get_document_service()

          try:
              stats = doc_service.ingest_directory(directory)

              console.print(Panel(
                  f"✅ Processed: {stats['processed']} files\n"
                  f"📄 Chunks created: {stats['chunks']}\n"
                  f"❌ Failed: {len(stats['failed'])}",
                  title="Ingestion Complete",
              ))

              if stats['failed']:
                  console.print("\n[red]Failed files:[/red]")
                  for fail in stats['failed']:
                      console.print(f"  - {fail['file']}: {fail['error']}")

              return 0

          except Exception as e:
              console.print(f"[red]Error: {e}[/red]")
              return 1


      def cmd_query(args):
          """Query the knowledge base."""
          question = args.question

          console.print(f"\n[blue]Question:[/blue] {question}\n")

          # Check if we have documents
          vector_store = get_vector_store()
          stats = vector_store.get_stats()

          if stats["document_count"] == 0:
              console.print("[yellow]⚠️ No documents in knowledge base. Run 'ingest' first.[/yellow]")
              return 1

          console.print("[dim]Researching...[/dim]\n")

          try:
              workflow = get_research_workflow()
              result = workflow.run(question)

              # Display answer
              console.print(Panel(
                  Markdown(result["answer"]),
                  title="Answer",
                  border_style="green",
              ))

              # Display metadata
              console.print(f"\n[dim]Iterations: {result['iterations']} | Revisions: {result['revisions']}[/dim]")

              if result.get("sources"):
                  console.print("\n[blue]Sources:[/blue]")
                  for source in result["sources"][:5]:
                      page_info = f" (Page {source['page']})" if source.get('page') else ""
                      console.print(f"  - {source['source']}{page_info}")

              return 0

          except Exception as e:
              console.print(f"[red]Error: {e}[/red]")
              logger.exception("Query failed")
              return 1


      def cmd_stats(args):
          """Show knowledge base statistics."""
          try:
              vector_store = get_vector_store()
              stats = vector_store.get_stats()

              console.print(Panel(
                  f"Collection: {stats['collection_name']}\n"
                  f"Documents: {stats['document_count']}\n"
                  f"Location: {stats['persist_directory']}",
                  title="Knowledge Base Stats",
              ))

              return 0

          except Exception as e:
              console.print(f"[red]Error: {e}[/red]")
              return 1


      def cmd_clear(args):
          """Clear the knowledge base."""
          if not args.yes:
              confirm = console.input("[yellow]Clear all documents? (y/N): [/yellow]")
              if confirm.lower() != 'y':
                  console.print("Cancelled.")
                  return 0

          try:
              vector_store = get_vector_store()
              vector_store.clear()
              console.print("[green]✅ Knowledge base cleared.[/green]")
              return 0

          except Exception as e:
              console.print(f"[red]Error: {e}[/red]")
              return 1


      def cmd_interactive(args):
          """Start interactive chat mode."""
          console.print(Panel(
              "Research Assistant - Interactive Mode\n"
              "Type your questions below. Type 'quit' or 'exit' to stop.",
              title="🔬 Research Assistant",
          ))

          # Check documents
          vector_store = get_vector_store()
          stats = vector_store.get_stats()
          console.print(f"[dim]Knowledge base: {stats['document_count']} documents[/dim]\n")

          workflow = get_research_workflow()

          while True:
              try:
                  question = console.input("[bold blue]You:[/bold blue] ")

                  if question.lower() in ('quit', 'exit', 'q'):
                      console.print("\nGoodbye! 👋")
                      break

                  if not question.strip():
                      continue

                  console.print("[dim]Thinking...[/dim]")

                  result = workflow.run(question)

                  console.print(f"\n[bold green]Assistant:[/bold green]")
                  console.print(Markdown(result["answer"]))
                  console.print()

              except KeyboardInterrupt:
                  console.print("\n\nGoodbye! 👋")
                  break
              except Exception as e:
                  console.print(f"[red]Error: {e}[/red]")


      def main():
          """Main CLI entry point."""
          parser = argparse.ArgumentParser(
              description="Research Assistant CLI",
              formatter_class=argparse.RawDescriptionHelpFormatter,
          )

          subparsers = parser.add_subparsers(dest="command", help="Commands")

          # Ingest command
          ingest_parser = subparsers.add_parser("ingest", help="Ingest documents")
          ingest_parser.add_argument(
              "--dir", "-d",
              default="./data/documents",
              help="Directory containing documents",
          )

          # Query command
          query_parser = subparsers.add_parser("query", help="Query the knowledge base")
          query_parser.add_argument("question", help="Research question")

          # Stats command
          subparsers.add_parser("stats", help="Show knowledge base statistics")

          # Clear command
          clear_parser = subparsers.add_parser("clear", help="Clear knowledge base")
          clear_parser.add_argument(
              "--yes", "-y",
              action="store_true",
              help="Skip confirmation",
          )

          # Interactive command
          subparsers.add_parser("interactive", help="Start interactive mode")

          args = parser.parse_args()

          if args.command == "ingest":
              sys.exit(cmd_ingest(args))
          elif args.command == "query":
              sys.exit(cmd_query(args))
          elif args.command == "stats":
              sys.exit(cmd_stats(args))
          elif args.command == "clear":
              sys.exit(cmd_clear(args))
          elif args.command == "interactive":
              sys.exit(cmd_interactive(args))
          else:
              parser.print_help()
              sys.exit(0)


      if __name__ == "__main__":
          main()

    verification:
      command: "python -c \"from research_assistant.cli import main; print('OK')\""
      expected_output: "OK"

