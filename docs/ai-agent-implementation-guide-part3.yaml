      """Pytest fixtures for Research Assistant tests."""

      import pytest
      from pathlib import Path
      import tempfile
      import shutil

      from research_assistant.config.settings import Settings


      @pytest.fixture
      def test_settings():
          """Provide test settings."""
          return Settings(
              ollama_model="llama3.2",
              chunk_size=500,
              chunk_overlap=100,
              retrieval_top_k=3,
              max_iterations=3,
              log_level="DEBUG",
          )


      @pytest.fixture
      def temp_dir():
          """Provide a temporary directory."""
          temp_path = Path(tempfile.mkdtemp())
          yield temp_path
          shutil.rmtree(temp_path, ignore_errors=True)


      @pytest.fixture
      def sample_text():
          """Provide sample text for testing."""
          return """
          Machine learning is a subset of artificial intelligence that enables
          systems to learn and improve from experience without being explicitly
          programmed. It focuses on developing computer programs that can access
          data and use it to learn for themselves.

          The process of learning begins with observations or data, such as examples,
          direct experience, or instruction, to look for patterns in data and make
