    # -------------------------------------------------------------------------
    - path: "src/research_assistant/tools/search.py"
      lines: 60
      content: |
        """Vector search tool for agents."""

        from langchain_core.tools import tool

        from research_assistant.services import get_vector_store
        from research_assistant.core.schemas import RetrievedDocument


        @tool
        def search_documents(query: str, top_k: int = 5) -> list[dict]:
            """
            Search the knowledge base for relevant documents.

            Args:
                query: The search query
                top_k: Number of results to return

            Returns:
                List of relevant documents with content and metadata
            """
            vector_store = get_vector_store()
            results = vector_store.search(query, top_k=top_k)

            return [
                {
                    "content": doc.content,
                    "source": doc.metadata.source,
                    "score": doc.score,
                }
                for doc in results
            ]


        def format_search_results(documents: list[RetrievedDocument]) -> str:
            """Format search results for display in prompts."""
            if not documents:
                return "No relevant documents found."

            formatted = []
            for i, doc in enumerate(documents, 1):
                formatted.append(
                    f"[{i}] Source: {doc.metadata.filename}\n"
                    f"    Score: {doc.score:.2f}\n"
                    f"    Content: {doc.content[:500]}..."
                )

            return "\n\n".join(formatted)

    # -------------------------------------------------------------------------
    # FILE 3.3: Document Tool
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/tools/document.py"
      lines: 40
      content: |
        """Document processing tools."""

        from pathlib import Path

        from research_assistant.services import (
            get_document_service,
            get_vector_store,
        )


        def ingest_documents(directory: str | Path | None = None) -> dict:
            """
            Ingest documents from a directory into the vector store.

            Args:
                directory: Directory path (uses default if None)

            Returns:
                Dictionary with ingestion stats
            """
            doc_service = get_document_service()
            vector_store = get_vector_store()

            dir_path = Path(directory) if directory else None
            chunks = doc_service.process_directory(dir_path)

            if chunks:
                added = vector_store.add_documents(chunks)
                return {
                    "files_processed": len(set(c.metadata.filename for c in chunks)),
                    "chunks_added": added,
                    "status": "success",
                }

            return {"files_processed": 0, "chunks_added": 0, "status": "no_files"}


        def get_document_stats() -> dict:
            """Get document store statistics."""
            return get_vector_store().get_stats()

