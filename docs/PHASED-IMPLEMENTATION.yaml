    - path: "src/research_assistant/agents/base.py"
      lines: 80
      content: |
        """Base agent class."""

        from abc import ABC, abstractmethod
        from typing import Any

        from research_assistant.services import get_llm_service


        class BaseAgent(ABC):
            """Abstract base class for all agents."""

            def __init__(self, name: str):
                self.name = name
                self._llm_service = get_llm_service()

            @abstractmethod
            def process(self, state: dict[str, Any]) -> dict[str, Any]:
                """Process the current state and return updates."""
                pass

            def _generate(self, prompt: str, system_prompt: str | None = None) -> str:
                """Generate LLM response."""
                return self._llm_service.generate(prompt, system_prompt)

            def __repr__(self) -> str:
                return f"{self.__class__.__name__}(name='{self.name}')"

    # -------------------------------------------------------------------------
    # FILE 4.3: Supervisor Agent
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/agents/supervisor.py"
      lines: 100
      content: |
        """Supervisor agent - orchestrates the workflow."""

        from typing import Any, Literal

        from research_assistant.agents.base import BaseAgent
        from research_assistant.config.prompts import SUPERVISOR_PROMPT


        class SupervisorAgent(BaseAgent):
            """Agent that coordinates the research workflow."""

            VALID_ROUTES = {"researcher", "writer", "critic", "FINISH"}

            def __init__(self):
                super().__init__("supervisor")

            def process(self, state: dict[str, Any]) -> dict[str, Any]:
                """Decide which agent should act next."""
                query = state.get("query", "")
                has_findings = bool(state.get("findings"))
                has_response = bool(state.get("response"))
                has_critique = bool(state.get("critique"))

                # Simple routing logic
                if not has_findings:
                    next_agent = "researcher"
                elif not has_response:
                    next_agent = "writer"
                elif not has_critique:
                    next_agent = "critic"
                else:
                    # Check if critique approved
                    critique = state.get("critique", {})
                    if critique.get("approved", False):
                        next_agent = "FINISH"
                    else:
                        # Need revision - go back to writer
                        next_agent = "writer"
                        state["revision_requested"] = True

                return {"next": next_agent}

            def route(
                self, state: dict[str, Any]
            ) -> Literal["researcher", "writer", "critic", "FINISH"]:
                """Return the next agent to invoke."""
                result = self.process(state)
                return result["next"]

    # -------------------------------------------------------------------------
    # FILE 4.4: Researcher Agent
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/agents/researcher.py"
      lines: 100
      content: |
        """Researcher agent - searches knowledge base."""

        from typing import Any

        from research_assistant.agents.base import BaseAgent
        from research_assistant.config.prompts import RESEARCHER_PROMPT
        from research_assistant.tools.search import search_documents, format_search_results
        from research_assistant.services import get_vector_store


        class ResearcherAgent(BaseAgent):
            """Agent that searches the knowledge base."""

            def __init__(self):
                super().__init__("researcher")
                self._vector_store = get_vector_store()

            def process(self, state: dict[str, Any]) -> dict[str, Any]:
                """Search for relevant documents."""
                query = state.get("query", "")

                # Search the knowledge base
                documents = self._vector_store.search(query)

                if not documents:
                    findings = "No relevant documents found in the knowledge base."
                else:
                    # Format documents for the prompt
                    docs_text = format_search_results(documents)

                    # Generate summary of findings
                    prompt = RESEARCHER_PROMPT.format(
                        query=query,
                        documents=docs_text
                    )
                    findings = self._generate(prompt)

                return {
                    "findings": findings,
                    "sources": [doc.model_dump() for doc in documents],
                }

    # -------------------------------------------------------------------------
    # FILE 4.5: Writer Agent
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/agents/writer.py"
      lines: 100
      content: |
        """Writer agent - synthesizes responses."""

        from typing import Any

        from research_assistant.agents.base import BaseAgent
        from research_assistant.config.prompts import WRITER_PROMPT


        class WriterAgent(BaseAgent):
            """Agent that writes research responses."""

            def __init__(self):
                super().__init__("writer")

            def process(self, state: dict[str, Any]) -> dict[str, Any]:
                """Generate a response based on findings."""
                query = state.get("query", "")
                findings = state.get("findings", "")
                revision_requested = state.get("revision_requested", False)
                previous_critique = state.get("critique", {})

                # Include critique feedback if revising
                if revision_requested and previous_critique:
                    findings += f"\n\nPrevious feedback: {previous_critique.get('feedback', '')}"

                prompt = WRITER_PROMPT.format(
                    query=query,
                    findings=findings
                )

                response = self._generate(prompt)

                return {
                    "response": response,
                    "revision_requested": False,  # Reset flag
                }

    # -------------------------------------------------------------------------
    # FILE 4.6: Critic Agent
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/agents/critic.py"
      lines: 100
      content: |
        """Critic agent - reviews responses."""

        from typing import Any

        from research_assistant.agents.base import BaseAgent
        from research_assistant.config.prompts import CRITIC_PROMPT


        class CriticAgent(BaseAgent):
            """Agent that critiques research responses."""

            def __init__(self):
                super().__init__("critic")

            def process(self, state: dict[str, Any]) -> dict[str, Any]:
                """Review the response quality."""
                query = state.get("query", "")
                response = state.get("response", "")
                iteration = state.get("iteration", 0)

                prompt = CRITIC_PROMPT.format(
                    query=query,
                    response=response
                )

                critique_text = self._generate(prompt)

                # Parse critique to determine if approved
                # Simple heuristic: if "approved" or "satisfactory" in response
                approved = any(
                    word in critique_text.lower()
                    for word in ["approved", "satisfactory", "good", "well-written"]
                )

                # Force approval after max iterations
                if iteration >= 2:
                    approved = True

                return {
                    "critique": {
                        "approved": approved,
                        "feedback": critique_text,
                    },
                    "iteration": iteration + 1,
                }

