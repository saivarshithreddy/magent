# ============================================================================
project_overview:
  name: "Student Research Assistant"
  description: |
    Multi-agent AI system using LangChain/LangGraph with RAG capabilities.
    Students upload research documents, ask questions, and get synthesized
    answers with citations from a team of specialized AI agents.

  architecture:
    components:
      - "Streamlit UI for document upload and chat"
      - "ChromaDB for vector storage"
      - "Ollama for local LLM inference"
      - "LangGraph for multi-agent orchestration"

    agents:
      supervisor: "Routes queries and coordinates agents"
      researcher: "Searches knowledge base for relevant docs"
      writer: "Synthesizes answers from retrieved content"
      critic: "Reviews and improves response quality"

  tech_stack:
    python: "3.11"
    frameworks: ["langchain>=0.3.0", "langgraph>=0.2.0", "streamlit>=1.28.0"]
    vector_db: "chromadb>=0.4.0"
    embeddings: "sentence-transformers>=2.2.0"
    llm: "Ollama with llama3.2"

