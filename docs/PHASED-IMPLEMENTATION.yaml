    # -------------------------------------------------------------------------
    - path: "src/research_assistant/graph/__init__.py"
      lines: 10
      content: |
        """Graph package - LangGraph workflow."""

        from research_assistant.graph.state import ResearchState
        from research_assistant.graph.workflow import (
            get_research_workflow,
            run_research,
        )

        __all__ = [
            "ResearchState",
            "get_research_workflow",
            "run_research",
        ]

    # -------------------------------------------------------------------------
    # FILE 5.2: State Schema
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/graph/state.py"
      lines: 50
      content: |
        """LangGraph state schema."""

        from typing import TypedDict, Any


        class ResearchState(TypedDict, total=False):
            """State for the research workflow."""

            # Input
            query: str

            # Research findings
            findings: str
            sources: list[dict[str, Any]]

            # Generated response
            response: str

            # Critique results
            critique: dict[str, Any]

            # Control flow
            next: str
            iteration: int
            revision_requested: bool

            # Errors
            error: str | None

    # -------------------------------------------------------------------------
    # FILE 5.3: Node Functions
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/graph/nodes.py"
      lines: 100
      content: |
        """LangGraph node functions."""

        from typing import Any

        from research_assistant.graph.state import ResearchState
        from research_assistant.agents import (
            SupervisorAgent,
            ResearcherAgent,
            WriterAgent,
            CriticAgent,
        )

        # Singleton agents
        _supervisor = SupervisorAgent()
        _researcher = ResearcherAgent()
        _writer = WriterAgent()
        _critic = CriticAgent()


        def supervisor_node(state: ResearchState) -> dict[str, Any]:
            """Supervisor decides next step."""
            return _supervisor.process(state)


        def researcher_node(state: ResearchState) -> dict[str, Any]:
            """Researcher searches knowledge base."""
            return _researcher.process(state)


        def writer_node(state: ResearchState) -> dict[str, Any]:
            """Writer generates response."""
            return _writer.process(state)


        def critic_node(state: ResearchState) -> dict[str, Any]:
            """Critic reviews response."""
            return _critic.process(state)


        def should_continue(state: ResearchState) -> str:
            """Determine if workflow should continue."""
            next_agent = state.get("next", "FINISH")
            if next_agent == "FINISH":
                return "end"
            return next_agent

    # -------------------------------------------------------------------------
    # FILE 5.4: Workflow Builder
    # -------------------------------------------------------------------------
    - path: "src/research_assistant/graph/workflow.py"
      lines: 150
      content: |
        """Main LangGraph workflow."""

        from functools import lru_cache
        from typing import Any

        from langgraph.graph import StateGraph, END

        from research_assistant.graph.state import ResearchState
        from research_assistant.graph.nodes import (
            supervisor_node,
            researcher_node,
            writer_node,
            critic_node,
            should_continue,
        )


        def build_research_graph() -> StateGraph:
            """Build the research workflow graph."""
            # Create graph
            graph = StateGraph(ResearchState)

            # Add nodes
            graph.add_node("supervisor", supervisor_node)
            graph.add_node("researcher", researcher_node)
            graph.add_node("writer", writer_node)
            graph.add_node("critic", critic_node)

            # Set entry point
            graph.set_entry_point("supervisor")

            # Add conditional edges from supervisor
            graph.add_conditional_edges(
                "supervisor",
                should_continue,
                {
                    "researcher": "researcher",
                    "writer": "writer",
                    "critic": "critic",
                    "end": END,
                }
            )

            # Add edges back to supervisor
            graph.add_edge("researcher", "supervisor")
            graph.add_edge("writer", "supervisor")
            graph.add_edge("critic", "supervisor")

            return graph


        @lru_cache
        def get_research_workflow():
            """Get compiled research workflow."""
            graph = build_research_graph()
            return graph.compile()


        def run_research(query: str) -> dict[str, Any]:
            """Run the research workflow."""
            workflow = get_research_workflow()

            initial_state: ResearchState = {
                "query": query,
                "iteration": 0,
            }

            result = workflow.invoke(initial_state)
            return {
                "query": query,
                "response": result.get("response", ""),
                "sources": result.get("sources", []),
                "iterations": result.get("iteration", 0),
            }

