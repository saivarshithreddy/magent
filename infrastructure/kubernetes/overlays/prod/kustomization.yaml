# Production Environment Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: research-assistant

resources:
  - ../../base

namePrefix: prod-

# Production-specific labels (using 'labels' instead of deprecated 'commonLabels')
labels:
  - pairs:
      environment: production
      app.kubernetes.io/part-of: research-assistant
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

# Production-specific patches
patches:
  # Increase resources for production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
    target:
      kind: Deployment
      name: research-assistant-app

  # Multiple replicas in production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: research-assistant-app

  # Override config for production
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: research-assistant-config
      data:
        RESEARCH_LOG_LEVEL: "INFO"
        RESEARCH_DEBUG: "false"
        RESEARCH_ENVIRONMENT: "production"
        RESEARCH_LOG_JSON: "true"
