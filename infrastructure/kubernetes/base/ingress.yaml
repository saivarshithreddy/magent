# ============================================================================
# KUBERNETES INGRESS - External Access
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: research-assistant-ingress
  namespace: research-assistant
  labels:
    app.kubernetes.io/name: research-assistant
    app.kubernetes.io/component: ingress
  annotations:
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "research-app-svc"

    # SSL redirect (uncomment for production)
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # Rate limiting (optional)
    # nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  ingressClassName: nginx

  # TLS configuration (uncomment for production)
  # tls:
  #   - hosts:
  #       - research.yourdomain.com
  #     secretName: research-assistant-tls

  rules:
    - host: research.local  # Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: research-app-svc
                port:
                  number: 8501
