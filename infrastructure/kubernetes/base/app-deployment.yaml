# ============================================================================
# KUBERNETES DEPLOYMENT - Research Assistant Application
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-assistant
  namespace: research-assistant
  labels:
    app.kubernetes.io/name: research-assistant
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: research-assistant
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: research-assistant
        app.kubernetes.io/component: app
    spec:
      serviceAccountName: research-assistant
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: app
          image: student-research-assistant:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8501
              protocol: TCP

          envFrom:
            - configMapRef:
                name: research-assistant-config
            - secretRef:
                name: research-assistant-secrets

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

          volumeMounts:
            - name: documents
              mountPath: /app/data/documents

          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: documents
          persistentVolumeClaim:
            claimName: documents-pvc

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: research-assistant
                topologyKey: kubernetes.io/hostname

---
# ============================================================================
# SERVICE - Research Assistant Application
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: research-app-svc
  namespace: research-assistant
  labels:
    app.kubernetes.io/name: research-assistant
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - port: 8501
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: research-assistant
    app.kubernetes.io/component: app

---
# ============================================================================
# SERVICE ACCOUNT
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: research-assistant
  namespace: research-assistant
  labels:
    app.kubernetes.io/name: research-assistant
