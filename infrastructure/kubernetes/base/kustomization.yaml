# ============================================================================
# KUSTOMIZATION - Base Configuration
# ============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: research-assistant-base

namespace: research-assistant

# Common labels applied to all resources (using 'labels' instead of deprecated 'commonLabels')
labels:
  - pairs:
      app.kubernetes.io/name: research-assistant
      app.kubernetes.io/version: "1.0.0"
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

# Resources to include
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - app-deployment.yaml
  - ollama-statefulset.yaml
  - chromadb-statefulset.yaml
  - ingress.yaml
  - rbac.yaml
  - secret.yaml
