# ============================================================================
# GLOSSARY
# ============================================================================
glossary:
  - term: "RAG"
    definition: "Retrieval Augmented Generation - combining retrieval with LLM generation"

  - term: "Embedding"
    definition: "Numerical vector representation of text for semantic comparison"

  - term: "Vector Database"
    definition: "Database optimized for storing and searching embeddings"

  - term: "Chunking"
    definition: "Splitting documents into smaller pieces for processing"

  - term: "LangChain"
    definition: "Framework for building LLM applications"

  - term: "LangGraph"
    definition: "Library for building stateful multi-agent workflows"

  - term: "Agent"
    definition: "AI component that can use tools and make decisions"

  - term: "Supervisor"
    definition: "Agent that orchestrates other agents"

  - term: "State"
    definition: "Shared data structure passed between agents"

  - term: "Node"
    definition: "Individual step in a LangGraph workflow"

  - term: "Edge"
    definition: "Connection between nodes defining flow"

