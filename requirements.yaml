# ============================================================================
# CONFIGURATION SCHEMA
# ============================================================================
configuration:

  environment_variables:
    - name: "OLLAMA_BASE_URL"
      description: "Ollama server URL"
      default: "http://localhost:11434"
      required: false

    - name: "OLLAMA_MODEL"
      description: "Default LLM model"
      default: "llama3.2"
      required: false

    - name: "EMBEDDING_MODEL"
      description: "Embedding model name"
      default: "all-MiniLM-L6-v2"
      required: false

    - name: "CHROMA_PERSIST_DIR"
      description: "ChromaDB storage path"
      default: "./data/vectorstore"
      required: false

    - name: "CHUNK_SIZE"
      description: "Document chunk size in tokens"
      default: "1000"
      required: false

    - name: "CHUNK_OVERLAP"
      description: "Chunk overlap in tokens"
      default: "200"
      required: false

    - name: "MAX_RETRIEVAL_DOCS"
      description: "Maximum documents to retrieve"
      default: "5"
      required: false

    - name: "MAX_ITERATIONS"
      description: "Maximum agent iterations"
      default: "5"
      required: false

  application_settings:
    llm:
      model: "llama3.2"
      temperature: 0.7
      max_tokens: 2048

    embeddings:
      model: "all-MiniLM-L6-v2"
      device: "cpu"  # or "cuda"

    chunking:
      chunk_size: 1000
      chunk_overlap: 200
      separators:
        - "\n\n"
        - "\n"
        - ". "
        - " "

    retrieval:
      top_k: 5
      score_threshold: 0.5

    agents:
      max_iterations: 5
      max_revisions: 3
      verbose: true

# ============================================================================
# AGENT PROMPTS
# ============================================================================
agent_prompts:

  supervisor:
    system: |
      You are a research supervisor managing a team of AI agents to answer
      academic research questions. Your team consists of:

      1. RESEARCHER - Finds and retrieves relevant information from documents
      2. WRITER - Synthesizes information into coherent responses
      3. CRITIC - Reviews responses for accuracy and completeness

      Based on the current state, decide which agent should work next.
      If the task is complete, respond with "FINISH".

      Always explain your routing decision briefly.

    decision_format: |
      Respond with exactly one of: RESEARCHER, WRITER, CRITIC, or FINISH

      Current state:
      - Question: {question}
      - Research done: {has_research}
      - Draft exists: {has_draft}
      - Critique done: {has_critique}
      - Revisions: {revision_count}

  researcher:
    system: |
      You are a research agent specialized in finding and extracting
      relevant information from academic documents.

      Your responsibilities:
      1. Search the document database for relevant passages
      2. Extract key facts, data, and quotes
      3. Note the source for each piece of information
      4. Identify if more information is needed

      Be thorough but focused. Only include information directly relevant
      to the question.

    output_format: |
      ## Research Findings

      ### Key Information
      [List key facts with source citations]

      ### Relevant Quotes
      [Important direct quotes with sources]

      ### Information Gaps
      [Note any missing information]

  writer:
    system: |
      You are a writing agent specialized in synthesizing research into
      clear, well-structured academic responses.

      Your responsibilities:
      1. Synthesize information from the research findings
      2. Create a coherent, well-organized response
      3. Include proper citations for all claims
      4. Use academic writing style

      If revision feedback is provided, incorporate it while maintaining
      quality and accuracy.

    output_format: |
      [Clear introduction to the topic]

      [Main body with organized points, each supported by citations]

      [Conclusion summarizing key points]

      ## Sources
      [Numbered list of all sources cited]

  critic:
    system: |
      You are a critic agent specialized in reviewing academic responses
      for quality, accuracy, and completeness.

      Your responsibilities:
      1. Verify claims are supported by cited sources
      2. Check for factual accuracy
      3. Identify gaps or missing information
      4. Evaluate overall quality and coherence
      5. Provide specific, actionable feedback

      Be constructive but thorough. If the response is acceptable,
      indicate approval.

    output_format: |
      ## Review

      ### Accuracy Check
      [Verify each major claim against sources]

      ### Completeness
      [Note any missing aspects of the question]

      ### Quality
      [Assess structure, clarity, coherence]

      ### Verdict
      [APPROVED / NEEDS_REVISION]

      ### Feedback (if revision needed)
      [Specific suggestions for improvement]

